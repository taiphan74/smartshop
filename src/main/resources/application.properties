spring.application.name=smartshop

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:${POSTGRES_PORT:5432}/${POSTGRES_DB:smartshop}
spring.datasource.username=${POSTGRES_USER:postgres}
spring.datasource.password=${POSTGRES_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Liquibase
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml

# Session
server.servlet.session.timeout=30m

# Connection Pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1200000

# DevTools - Hot Reload
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true

# Multipart Configuration (Dành cho Spring Boot 3+)
# Thay thế CommonsMultipartResolver cũ
# Giới hạn file tối đa (10MB)
spring.servlet.multipart.max-file-size=10MB
# Giới hạn tổng dung lượng request tối đa (10MB)
spring.servlet.multipart.max-request-size=10MB
# Enable multipart
spring.servlet.multipart.enabled=true
# Mặc định Spring Boot 3+ đã sử dụng UTF-8

