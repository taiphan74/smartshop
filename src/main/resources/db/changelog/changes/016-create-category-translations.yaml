databaseChangeLog:
  - changeSet:
      id: 016-create-category-translations
      author: codex
      changes:
        - createTable:
            tableName: category_translations
            columns:
              - column:
                  name: id
                  type: uuid
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: pk_category_translations
              - column:
                  name: category_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: locale
                  type: varchar(10)
                  constraints:
                    nullable: false
              - column:
                  name: name
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: category_translations
            baseColumnNames: category_id
            referencedTableName: categories
            referencedColumnNames: id
            constraintName: fk_category_translations_category
            onDelete: CASCADE
        - addUniqueConstraint:
            tableName: category_translations
            columnNames: category_id, locale
            constraintName: uk_category_translations_category_locale
        - createIndex:
            tableName: category_translations
            indexName: idx_category_translations_locale
            columns:
              - column:
                  name: locale
