databaseChangeLog:
  - changeSet:
      id: 018-seed-leaf-category-products
      author: codex
      changes:
        - sql:
            dbms: postgresql
            splitStatements: true
            stripComments: true
            sql: |
              -- Normalize old demo products from legacy category slugs to current leaf category slugs.
              UPDATE products p
              SET category_id = c.id,
                  updated_at = CURRENT_TIMESTAMP
              FROM categories c
              WHERE p.slug = 'iphone-15-pro'
                AND c.slug = 'dien-tu-dien-thoai-smartphone';

              UPDATE products p
              SET category_id = c.id,
                  updated_at = CURRENT_TIMESTAMP
              FROM categories c
              WHERE p.slug = 'samsung-galaxy-s24-ultra'
                AND c.slug = 'dien-tu-dien-thoai-smartphone';

              UPDATE products p
              SET category_id = c.id,
                  updated_at = CURRENT_TIMESTAMP
              FROM categories c
              WHERE p.slug = 'macbook-air-m2'
                AND c.slug = 'dien-tu-laptop-laptop-van-phong';

              UPDATE products p
              SET category_id = c.id,
                  updated_at = CURRENT_TIMESTAMP
              FROM categories c
              WHERE p.slug = 'sony-wh-1000xm5'
                AND c.slug = 'dien-tu-thiet-bi-am-thanh-tai-nghe';

