              INSERT INTO products (id, shop_id, category_id, name, slug, description, price, stock_quantity, status, created_at, updated_at)
              SELECT gen_random_uuid(),
                     shop.id,
                     category.id,
                     seed.product_name,
                     seed.product_slug,
                     seed.product_description,
                     seed.price,
                     seed.stock_quantity,
                     TRUE,
                     CURRENT_TIMESTAMP,
                     CURRENT_TIMESTAMP
              FROM seed
              JOIN shops shop ON shop.slug = 'smartshop-official'
              JOIN categories category ON category.slug = seed.category_slug
              WHERE NOT EXISTS (
                SELECT 1 FROM products product WHERE product.slug = seed.product_slug
              );

              -- Add one image for seeded demo products.
              INSERT INTO product_images (id, product_id, image_url, is_main, sort_order)
              SELECT gen_random_uuid(),
                     product.id,
                     'https://picsum.photos/seed/' || product.slug || '/800/800',
                     TRUE,
                     1
              FROM products product
              WHERE product.slug LIKE 'demo-%'
                AND NOT EXISTS (
                  SELECT 1 FROM product_images image WHERE image.product_id = product.id
                );

              -- Add one basic variant for seeded demo products.
              INSERT INTO product_variants (id, product_id, sku, price, stock_quantity, status, created_at, updated_at)
              SELECT gen_random_uuid(),
                     product.id,
                     'DEMO-' || upper(substring(md5(product.slug), 1, 12)),
                     product.price,
                     product.stock_quantity,
                     TRUE,
                     CURRENT_TIMESTAMP,
                     CURRENT_TIMESTAMP
              FROM products product
              WHERE product.slug LIKE 'demo-%'
                AND NOT EXISTS (
                  SELECT 1 FROM product_variants variant WHERE variant.product_id = product.id
                );
