databaseChangeLog:
  - changeSet:
      id: 021-delete-samsung-sony-broken-products
      author: muoi (via AI)
      changes:
        - sql:
            dbms: postgresql
            splitStatements: true
            stripComments: true
            sql: |
              -- Xóa liên kết trong các bảng phụ trước để tránh lỗi khóa ngoại (Foreign Key)
              DELETE FROM product_variant_values WHERE variant_id IN (SELECT id FROM product_variants WHERE product_id IN (SELECT id FROM products WHERE slug IN ('samsung-galaxy-s24-ultra', 'sony-wh-1000xm5')));
              DELETE FROM product_variants WHERE product_id IN (SELECT id FROM products WHERE slug IN ('samsung-galaxy-s24-ultra', 'sony-wh-1000xm5'));
              DELETE FROM product_option_values WHERE option_id IN (SELECT id FROM product_options WHERE product_id IN (SELECT id FROM products WHERE slug IN ('samsung-galaxy-s24-ultra', 'sony-wh-1000xm5')));
              DELETE FROM product_options WHERE product_id IN (SELECT id FROM products WHERE slug IN ('samsung-galaxy-s24-ultra', 'sony-wh-1000xm5'));
              DELETE FROM product_images WHERE product_id IN (SELECT id FROM products WHERE slug IN ('samsung-galaxy-s24-ultra', 'sony-wh-1000xm5'));
              
              -- Xóa chính thức 2 sản phẩm lỗi khỏi bảng products
              DELETE FROM products WHERE slug IN ('samsung-galaxy-s24-ultra', 'sony-wh-1000xm5');
