databaseChangeLog:
  - changeSet:
      id: 022-seed-multi-random-product-reviews-pure-sql
      author: muoi
      changes:
        - sql:
            dbms: postgresql
            splitStatements: false
            sql: |
              -- 1. SỬ DỤNG PURE SQL CTE ĐỂ THỰC HIỆN MULTI-INSERT TỰ ĐỘNG
              WITH unreviewed_products AS (
                  SELECT p.id as product_id, p.name, p.price,
                         (SELECT id FROM shops WHERE slug = 'smartshop-official' LIMIT 1) as shop_id,
                         -- Random 4 đến 7 review cho mỗi sản phẩm
                         (4 + floor(random() * 4))::int as target_reviews
                  FROM products p
                  WHERE NOT EXISTS (SELECT 1 FROM product_reviews pr WHERE pr.product_id = p.id)
              ),
              generated_slots AS (
                  -- Nhân bản số dòng theo target_reviews bằng generate_series
                  SELECT up.*, gs.slot, gen_random_uuid() as order_id
                  FROM unreviewed_products up
                  JOIN generate_series(1, 7) gs(slot) ON gs.slot <= (4 + floor(random() * 4))::int
              ),
              inserted_orders AS (
                  -- Insert toàn bộ Đơn hàng và trả về danh sách ID vừa tạo
                  INSERT INTO orders (
                      id, code, user_id, shop_id, receiver_name, receiver_phone,
                      shipping_province, shipping_district, shipping_ward, shipping_detail,
                      note, total_amount, shipping_fee, discount_amount, final_amount,
                      status, payment_method, payment_status, created_at, updated_at
                  )
                  SELECT
                      gs.order_id,
                      'SEED-ORD-' || upper(substring(gs.order_id::text, 1, 8)),
                      -- Dùng md5() ép PostgreSQL query lại user ngẫu nhiên cho TỪNG row thay vì cache 1 user
                      (SELECT id FROM users WHERE email LIKE '%@smartshop.local' AND email != 'seller@smartshop.local' ORDER BY md5(gs.order_id::text || id::text) LIMIT 1),
                      gs.shop_id,
                      'Khách Hàng Hệ Thống',
                      '0920000' || floor(random()*900+100)::text,
                      'Hồ Chí Minh', 'Quận 1', 'Phường Bến Nghé', 'Seed address',
                      'Đơn hàng tự động sinh review đa dạng mẫu',
                      gs.price, 0, 0, gs.price,
                      'DELIVERED', 'COD', 'PAID', CURRENT_TIMESTAMP, CURRENT_TIMESTAMP
                  FROM generated_slots gs
                  RETURNING id, user_id
              ),
              inserted_items AS (
                  -- Insert toàn bộ Chi tiết đơn hàng
                  INSERT INTO order_items (
                      id, order_id, product_id, product_name, product_image_url, price, quantity, subtotal, created_at
                  )
                  SELECT
                      gen_random_uuid(), gs.order_id, gs.product_id, gs.name, '', gs.price, 1, gs.price, CURRENT_TIMESTAMP
                  FROM generated_slots gs
                  RETURNING id
              )
              -- Insert toàn bộ Bài đánh giá
              INSERT INTO product_reviews (
                  id, product_id, user_id, order_id, rating, comment, created_at, updated_at, created_by, updated_by
              )
              SELECT
                  gen_random_uuid(), gs.product_id, io.user_id, gs.order_id,
                  -- Trộn ngẫu nhiên điểm 4 và 5 sao
                  (4 + floor(random() * 2))::int,
                  -- Trộn ngẫu nhiên câu chữ bình luận
                  CASE (gs.slot % 4)
                    WHEN 0 THEN 'Sản phẩm dùng tốt, đúng như mô tả của shop.'
                    WHEN 1 THEN 'Chất lượng rất đáng tiền, đóng gói kỹ, giao hàng nhanh chóng!'
                    WHEN 2 THEN 'Mọi thứ vô cùng cẩn thận, hàng chuẩn xịn, rất ưng ý.'
                    ELSE 'Tuyệt vời! Sẽ giới thiệu cho bạn bè cùng mua.'
                  END,
                  CURRENT_TIMESTAMP, CURRENT_TIMESTAMP, 'seeder', 'seeder'
              FROM generated_slots gs
              JOIN inserted_orders io ON gs.order_id = io.id;

        - sql:
            dbms: postgresql
            splitStatements: false
            sql: |
              -- 2. ĐỒNG BỘ LẠI ĐIỂM SỐ LÊN BẢNG PRODUCTS 
              UPDATE products p
              SET review_count = s.review_count,
                  rating_sum = s.rating_sum,
                  average_rating = s.average_rating
              FROM (
                SELECT product_id,
                       COUNT(*) AS review_count,
                       SUM(rating) AS rating_sum,
                       ROUND(AVG(rating)::numeric, 2) AS average_rating
                FROM product_reviews
                GROUP BY product_id
              ) s
              WHERE p.id = s.product_id;
