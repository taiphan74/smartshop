databaseChangeLog:
  - changeSet:
      id: 014-add-session-voucher-support
      author: github-copilot
      changes:
        - createTable:
            tableName: vouchers
            columns:
              - column:
                  name: id
                  type: varchar(255)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: code
                  type: varchar(50)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: name
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: scope
                  type: varchar(20)
                  constraints:
                    nullable: false
              - column:
                  name: discount_type
                  type: varchar(20)
                  constraints:
                    nullable: false
              - column:
                  name: discount_value
                  type: decimal(15,2)
                  constraints:
                    nullable: false
              - column:
                  name: max_discount_amount
                  type: decimal(15,2)
              - column:
                  name: min_order_value
                  type: decimal(15,2)
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: usage_limit
                  type: integer
              - column:
                  name: used_count
                  type: integer
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: active
                  type: boolean
                  defaultValueBoolean: true
                  constraints:
                    nullable: false
              - column:
                  name: start_at
                  type: timestamp
              - column:
                  name: end_at
                  type: timestamp
              - column:
                  name: created_at
                  type: timestamp
              - column:
                  name: updated_at
                  type: timestamp
        - addColumn:
            tableName: session_orders
            columns:
              - column:
                  name: discount_amount
                  type: decimal(15,2)
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: shipping_discount_amount
                  type: decimal(15,2)
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: final_amount
                  type: decimal(15,2)
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: order_voucher_code
                  type: varchar(50)
              - column:
                  name: shipping_voucher_code
                  type: varchar(50)
        - sql:
            sql: |
              UPDATE session_orders
              SET discount_amount = 0,
                  shipping_discount_amount = 0,
                  final_amount = total_amount
              WHERE final_amount = 0 OR final_amount IS NULL;
