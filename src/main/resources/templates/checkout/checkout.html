<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Thanh toán')}"></head>
<body class="bg-page-bg text-text-primary font-sans antialiased">
<div th:replace="~{fragments/header :: header}"></div>

<main class="container mx-auto px-4 py-8 max-w-[1200px]">
    <h1 class="text-2xl font-semibold mb-6">Thanh toán</h1>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <div class="lg:col-span-2 bg-white rounded-lg shadow-sm p-6">
            <h2 class="text-lg font-semibold mb-4">Thông tin nhận hàng</h2>

            <div th:if="${error}" class="mb-4 px-4 py-3 bg-red-100 text-red-700 rounded-md" th:text="${error}"></div>

            <form th:action="@{/checkout}" method="post" th:object="${checkoutForm}" class="space-y-4">
                <div>
                    <label class="block mb-1 font-medium">Họ và tên</label>
                    <input th:field="*{fullName}" type="text"
                           class="w-full border border-gray-300 rounded-md px-4 py-2 outline-none focus:ring-2 focus:ring-blue-400">
                </div>

                <div>
                    <label class="block mb-1 font-medium">Số điện thoại</label>
                    <input th:field="*{phone}" type="text"
                           class="w-full border border-gray-300 rounded-md px-4 py-2 outline-none focus:ring-2 focus:ring-blue-400">
                </div>

                <div>
                    <label class="block mb-1 font-medium">Địa chỉ nhận hàng</label>
                    <input th:field="*{address}" type="text"
                           class="w-full border border-gray-300 rounded-md px-4 py-2 outline-none focus:ring-2 focus:ring-blue-400">
                </div>

                <div>
                    <label class="block mb-1 font-medium">Ghi chú</label>
                    <textarea th:field="*{note}" rows="4"
                              class="w-full border border-gray-300 rounded-md px-4 py-2 outline-none focus:ring-2 focus:ring-blue-400"></textarea>
                </div>

                <div class="flex gap-3 pt-2">
                    <a th:href="@{/cart}" class="px-6 py-2 bg-gray-200 rounded-md hover:bg-gray-300">
                        Quay lại giỏ hàng
                    </a>
                    <button type="submit" class="px-6 py-2 bg-brand-blue text-white rounded-md hover:opacity-90">
                        Xác nhận đặt hàng
                    </button>
                </div>
            </form>
        </div>

        <div class="bg-white rounded-lg shadow-sm p-6">
            <h2 class="text-lg font-semibold mb-4">Đơn hàng của bạn</h2>

            <div class="space-y-4">
                <div th:each="item : ${cart.items}" class="flex gap-3 border-b pb-3">
                    <img th:src="${item.imageUrl}" alt="" class="w-16 h-16 object-cover rounded">
                    <div class="flex-1">
                        <div class="font-medium" th:text="${item.name}">Tên sản phẩm</div>
                        <div class="text-sm text-gray-500">
                            SL: <span th:text="${item.quantity}"></span>
                        </div>
                        <div class="text-sm text-red-500 font-semibold"
                             th:text="${#numbers.formatDecimal(item.subtotal, 0, 'COMMA', 0, 'POINT')} + ' ₫'">
                            0 ₫
                        </div>
                    </div>
                </div>
            </div>

            <div class="mt-6 border-t pt-4 space-y-2">
                <div class="flex justify-between">
                    <span>Tổng số lượng</span>
                    <span th:text="${cart.totalQuantity}">0</span>
                </div>
                <div class="flex justify-between text-lg font-semibold">
                    <span>Tổng thanh toán</span>
                    <span class="text-red-500"
                          th:text="${#numbers.formatDecimal(cart.totalAmount, 0, 'COMMA', 0, 'POINT')} + ' ₫'">
                        0 ₫
                    </span>
                </div>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
