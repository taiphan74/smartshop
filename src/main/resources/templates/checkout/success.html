<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Đặt hàng thành công')}"></head>
<body class="bg-page-bg text-text-primary font-sans antialiased">
<div th:replace="~{fragments/header :: header}"></div>

<main class="container mx-auto px-4 py-8 max-w-[900px]">
    <div class="bg-white rounded-lg shadow-sm p-8">
        <h1 class="text-2xl font-bold text-green-600 mb-4">Đặt hàng thành công</h1>

        <p class="mb-2">Mã đơn hàng: <span class="font-semibold" th:text="${order.orderCode}"></span></p>
        <p class="mb-6">Cảm ơn bạn đã mua hàng tại SmartShop.</p>

        <div class="mb-6">
            <h2 class="text-lg font-semibold mb-3">Thông tin người nhận</h2>
            <p><strong>Họ tên:</strong> <span th:text="${order.customerName}"></span></p>
            <p><strong>Số điện thoại:</strong> <span th:text="${order.phone}"></span></p>
            <p><strong>Địa chỉ:</strong> <span th:text="${order.address}"></span></p>
            <p><strong>Ghi chú:</strong> <span th:text="${order.note != null && !order.note.isBlank() ? order.note : 'Không có'}"></span></p>
        </div>

        <div class="mb-6">
            <h2 class="text-lg font-semibold mb-3">Sản phẩm đã đặt</h2>
            <div th:each="item : ${order.items}" class="flex justify-between border-b py-2">
                <div>
                    <span th:text="${item.productName}"></span>
                    <span class="text-gray-500">x <span th:text="${item.quantity}"></span></span>
                </div>
                <div th:text="${#numbers.formatDecimal(item.subtotal, 0, 'COMMA', 0, 'POINT')} + ' ₫'"></div>
            </div>
        </div>

        <div class="border-t pt-4 text-lg font-semibold flex justify-between">
            <span>Tổng thanh toán</span>
            <span class="text-red-500"
                  th:text="${#numbers.formatDecimal(order.totalAmount, 0, 'COMMA', 0, 'POINT')} + ' ₫'"></span>
        </div>

        <div class="mt-6">
            <a th:href="@{/}" class="inline-block px-6 py-2 bg-brand-blue text-white rounded-md">
                Về trang chủ
            </a>
        </div>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
