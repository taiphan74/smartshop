<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Thanh Toán - SmartShop</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen">
    <div class="max-w-3xl mx-auto py-10 px-4">
        <h1 class="text-3xl font-bold mb-6">Thanh Toán (COD)</h1>
        
        <div class="flex flex-col md:flex-row gap-6">
            <div class="flex-1 bg-white p-6 rounded-lg shadow-sm border border-gray-100">
                <h2 class="text-xl font-semibold mb-4">Thông tin giao hàng</h2>
                <form th:action="@{/checkout/process}" method="post">
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-700 mb-1">Họ và tên</label>
                        <input type="text" name="customerName" required class="w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500">
                    </div>
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-700 mb-1">Số điện thoại</label>
                        <input type="text" name="customerPhone" required class="w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500">
                    </div>
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-700 mb-1">Địa chỉ giao hàng chi tiết</label>
                        <textarea name="customerAddress" rows="3" required class="w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500"></textarea>
                    </div>
                    <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700 transition">Đặt Hàng</button>
                </form>
            </div>
            
            <div class="w-full md:w-80 bg-white p-6 rounded-lg shadow-sm border border-gray-100 h-fit">
                <h2 class="text-lg font-semibold mb-4">Đơn hàng của bạn</h2>
                <div class="space-y-3 mb-4">
                    <div class="flex justify-between" th:each="item : ${cart.items}">
                        <span class="text-sm truncate mr-2" th:text="${item.productName}">Sp</span>
                        <span class="text-sm font-medium whitespace-nowrap" th:text="${item.quantity + ' x ' + #numbers.formatDecimal(item.price, 0, 'COMMA', 0, 'POINT')} + 'đ'">1</span>
                    </div>
                </div>
                <div class="border-t pt-4 space-y-2">
                    <div class="flex justify-between text-sm">
                        <span class="text-gray-600">Tạm tính</span>
                        <span class="font-medium" th:text="${#numbers.formatDecimal(cart.subTotal, 0, 'COMMA', 0, 'POINT')} + 'đ'">0đ</span>
                    </div>
                    <div class="flex justify-between text-sm">
                        <span class="text-gray-600">Phí giao hàng</span>
                        <span class="font-medium" th:text="${#numbers.formatDecimal(cart.shippingFee, 0, 'COMMA', 0, 'POINT')} + 'đ'">0đ</span>
                    </div>
                    <div class="flex justify-between font-bold text-lg mt-2 pt-2 border-t font-black text-blue-600">
                        <span>Tổng cộng</span>
                        <span th:text="${#numbers.formatDecimal(cart.total, 0, 'COMMA', 0, 'POINT')} + 'đ'">0đ</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
