<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Đăng nhập | Smartshop</title>
	<link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="auth-page">
<main class="auth-shell">
	<section class="auth-card">
		<div class="auth-brand">
			<p class="eyebrow">Smartshop Marketplace</p>
			<h1>Đăng nhập</h1>
			<p>Quản lý tài khoản, shop và vận hành sàn thương mại điện tử trên cùng một hệ thống.</p>
		</div>

		<div class="alert success" th:if="${param.logout}">Bạn đã đăng xuất thành công.</div>
		<div class="alert error" th:if="${formError}" th:text="${formError}"></div>

		<form class="auth-form" th:action="@{/auth/login}" th:object="${loginRequest}" method="post">
			<label>
				<span>Email hoặc số điện thoại</span>
				<input type="text" th:field="*{emailOrPhone}" placeholder="email@company.com">
				<small class="field-error" th:if="${#fields.hasErrors('emailOrPhone')}" th:errors="*{emailOrPhone}"></small>
			</label>

			<label>
				<span>Mật khẩu</span>
				<input type="password" th:field="*{password}" placeholder="Nhập mật khẩu">
				<small class="field-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></small>
			</label>

			<button type="submit">Đăng nhập</button>
		</form>

		<p class="auth-switch">
			Chưa có tài khoản?
			<a th:href="@{/auth/register}">Đăng ký ngay</a>
		</p>
	</section>
</main>
</body>
</html>
