<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head(#{auth.login.page_title})}"></head>
<body class="bg-page-bg text-text-primary font-sans antialiased flex flex-col min-h-screen">

    <main class="flex-grow flex items-center justify-center px-4 py-12">
        <div class="w-full max-w-[400px] bg-surface rounded-lg shadow-md border border-border p-8">
            <!-- Brand/Header -->
            <div class="text-center mb-8">
                <a th:href="@{/}" class="inline-block mb-6">
                    <img th:src="@{/images/smartshop-logo.png}" alt="SmartShop Logo" class="w-16 h-16 mx-auto rounded-md shadow-sm">
                </a>
                <h1 class="text-2xl font-bold text-text-primary mb-2" th:text="#{auth.login.title}">Đăng nhập</h1>
                <p class="text-sm text-text-secondary" th:text="#{auth.login.subtitle}">Chào mừng bạn quay lại với SmartShop</p>
            </div>

            <!-- Alerts -->
            <div th:if="${param.logout}" class="mb-4 p-3 bg-brand-green-soft text-brand-green text-sm rounded-md border border-brand-green/20">
                <span th:text="#{auth.login.logout_success}">Bạn đã đăng xuất thành công.</span>
            </div>
            <div th:if="${formError}" class="mb-4 p-3 bg-brand-red-soft text-brand-red text-sm rounded-md border border-brand-red/20" th:text="${formError}">
                <span th:text="#{auth.login.error}">Lỗi đăng nhập.</span>
            </div>

            <!-- Form -->
            <form th:action="@{/auth/login}" th:object="${loginRequest}" method="post" class="space-y-5">
                <div>
                    <label for="emailOrPhone" class="block text-sm font-medium text-text-primary mb-1.5" th:text="#{auth.login.email_or_phone}">Email hoặc số điện thoại</label>
                    <input type="text" th:field="*{emailOrPhone}" id="emailOrPhone" 
                           th:placeholder="#{auth.login.email_placeholder}" placeholder="username@email.com"
                           class="w-full h-11 px-4 rounded-sm border border-border focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all placeholder:text-text-muted text-sm">
                    <p class="mt-1 text-xs text-brand-red font-medium" th:if="${#fields.hasErrors('emailOrPhone')}" th:errors="*{emailOrPhone}"></p>
                </div>

                <div>
                    <div class="flex items-center justify-between mb-1.5">
                        <label for="password" class="block text-sm font-medium text-text-primary" th:text="#{auth.login.password}">Mật khẩu</label>
                        <a href="#" class="text-xs text-brand-blue hover:underline" th:text="#{auth.login.forgot_password}">Quên mật khẩu?</a>
                    </div>
                    <input type="password" th:field="*{password}" id="password" 
                           th:placeholder="#{auth.login.password_placeholder}" placeholder="Nhập mật khẩu"
                           class="w-full h-11 px-4 rounded-sm border border-border focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all placeholder:text-text-muted text-sm">
                    <p class="mt-1 text-xs text-brand-red font-medium" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></p>
                </div>

                <button type="submit"
                        class="w-full h-11 bg-brand-blue hover:bg-brand-blue-hover text-white font-medium rounded-md shadow-sm transition-colors cursor-pointer mt-2"
                        th:text="#{auth.login.submit}">
                    Đăng nhập
                </button>
            </form>

            <!-- Switch -->
            <div class="mt-8 pt-6 border-t border-border text-center">
                <p class="text-sm text-text-secondary">
                    <span th:text="#{auth.login.no_account}">Chưa có tài khoản?</span> 
                    <a th:href="@{/auth/register}" class="text-brand-blue font-medium hover:underline" th:text="#{auth.login.register_now}">Đăng ký ngay</a>
                </p>
            </div>
        </div>
    </main>

</body>
</html>
