<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Dang nhap | Smartshop</title>
	<link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="auth-page">
<main class="auth-shell">
	<section class="auth-card">
		<div class="auth-brand">
			<p class="eyebrow">Smartshop Marketplace</p>
			<h1>Dang nhap</h1>
			<p>Quan ly tai khoan, shop va van hanh san thuong mai dien tu tren cung mot he thong.</p>
		</div>

		<div class="alert success" th:if="${param.logout}">Ban da dang xuat thanh cong.</div>
		<div class="alert error" th:if="${formError}" th:text="${formError}"></div>

		<form class="auth-form" th:action="@{/auth/login}" th:object="${loginRequest}" method="post">
			<label>
				<span>Email hoac so dien thoai</span>
				<input type="text" th:field="*{emailOrPhone}" placeholder="email@company.com">
				<small class="field-error" th:if="${#fields.hasErrors('emailOrPhone')}" th:errors="*{emailOrPhone}"></small>
			</label>

			<label>
				<span>Mat khau</span>
				<input type="password" th:field="*{password}" placeholder="Nhap mat khau">
				<small class="field-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></small>
			</label>

			<button type="submit">Dang nhap</button>
		</form>

		<p class="auth-switch">
			Chua co tai khoan?
			<a th:href="@{/auth/register}">Dang ky ngay</a>
		</p>
	</section>
</main>
</body>
</html>
