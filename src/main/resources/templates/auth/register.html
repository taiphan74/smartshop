<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head(#{auth.register.page_title})}"></head>
<body class="bg-page-bg text-text-primary font-sans antialiased flex flex-col min-h-screen">

    <main class="flex-grow flex items-center justify-center px-4 py-12">
        <div class="w-full max-w-[480px] bg-surface rounded-lg shadow-md border border-border p-8">
            <!-- Brand/Header -->
            <div class="text-center mb-8">
                <a th:href="@{/}" class="inline-block mb-6">
                    <img th:src="@{/images/smartshop-logo.png}" alt="SmartShop Logo" class="w-16 h-16 mx-auto rounded-md shadow-sm">
                </a>
                <h1 class="text-2xl font-bold text-text-primary mb-2" th:text="#{auth.register.title}">Tạo tài khoản</h1>
                <p class="text-sm text-text-secondary" th:text="#{auth.register.subtitle}">Trở thành thành viên của gia đình SmartShop</p>
            </div>

            <!-- Alerts -->
            <div th:if="${formError}" class="mb-5 p-3.5 bg-brand-red-soft text-brand-red text-sm rounded-md border border-brand-red/20 shadow-sm" th:text="${formError}">
                <span th:text="#{auth.register.error}">Lỗi đăng ký.</span>
            </div>

            <!-- Form -->
            <form th:action="@{/auth/register}" th:object="${registerRequest}" method="post" class="space-y-5">
                <div>
                    <label for="email" class="block text-sm font-medium text-text-primary mb-1.5" th:text="#{auth.register.email}">Email</label>
                    <input type="email" th:field="*{email}" id="email"
                           th:placeholder="#{auth.register.email_placeholder}" placeholder="email@example.com"
                           class="w-full h-11 px-4 rounded-sm border border-border focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all placeholder:text-text-muted text-sm">
                    <p class="mt-1 text-[11px] text-brand-red font-semibold uppercase tracking-tight" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></p>
                </div>

                <div>
                    <label for="fullName" class="block text-sm font-medium text-text-primary mb-1.5" th:text="#{auth.register.full_name}">Họ và tên</label>
                    <input type="text" th:field="*{fullName}" id="fullName"
                           th:placeholder="#{auth.register.full_name_placeholder}" placeholder="Nguyễn Văn A"
                           class="w-full h-11 px-4 rounded-sm border border-border focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all placeholder:text-text-muted text-sm">
                    <p class="mt-1 text-[11px] text-brand-red font-semibold uppercase tracking-tight" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></p>
                </div>

                <div>
                    <label for="password" class="block text-sm font-medium text-text-primary mb-1.5" th:text="#{auth.register.password}">Mật khẩu</label>
                    <input type="password" th:field="*{password}" id="password"
                           th:placeholder="#{auth.register.password_placeholder}" placeholder="Nhập mật khẩu (tối thiểu 6 ký tự)"
                           class="w-full h-11 px-4 rounded-sm border border-border focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all placeholder:text-text-muted text-sm">
                    <p class="mt-1 text-[11px] text-brand-red font-semibold uppercase tracking-tight" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></p>
                </div>

                <div class="pt-2">
                    <button type="submit"
                            class="w-full h-12 bg-brand-blue hover:bg-brand-blue-hover text-white font-medium rounded-md shadow-sm transition-all transform active:scale-[98%] cursor-pointer"
                            th:text="#{auth.register.submit}">
                        Đăng ký tài khoản
                    </button>
                </div>
            </form>

            <!-- Switch -->
            <div class="mt-8 pt-6 border-t border-border text-center">
                <p class="text-sm text-text-secondary">
                    <span th:text="#{auth.register.has_account}">Đã có tài khoản?</span> 
                    <a th:href="@{/auth/login}" class="text-brand-blue font-medium hover:underline" th:text="#{auth.register.login_now}">Đăng nhập ngay</a>
                </p>
            </div>
            
            <p class="mt-6 text-[11px] text-text-muted text-center leading-relaxed">
                <span th:text="#{auth.register.agreement}">Bằng việc đăng ký, bạn đồng ý với SmartShop về</span> <br>
                <a href="#" class="text-brand-blue hover:underline" th:text="#{auth.register.terms}">Điều khoản dịch vụ</a> & 
                <a href="#" class="text-brand-blue hover:underline" th:text="#{auth.register.privacy}">Chính sách bảo mật</a>
            </p>
        </div>
    </main>

</body>
</html>
