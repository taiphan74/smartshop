<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Đăng ký | Smartshop</title>
	<link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="auth-page">
<main class="auth-shell">
	<section class="auth-card wide">
		<div class="auth-brand">
			<p class="eyebrow">Smartshop Marketplace</p>
			<h1>Tạo tài khoản</h1>
			<p>Đăng ký để trở thành khách hàng trong hệ thống marketplace nhiều shop.</p>
		</div>

		<div class="alert error" th:if="${formError}" th:text="${formError}"></div>

		<form class="auth-form grid" th:action="@{/auth/register}" th:object="${registerRequest}" method="post">
			<label>
				<span>Email</span>
				<input type="email" th:field="*{email}" placeholder="name@example.com">
				<small class="field-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></small>
			</label>

			<label>
				<span>Số điện thoại</span>
				<input type="text" th:field="*{phone}" placeholder="0900000000">
				<small class="field-error" th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}"></small>
			</label>

			<label class="full">
				<span>Họ và tên</span>
				<input type="text" th:field="*{fullName}" placeholder="Nguyễn Văn A">
				<small class="field-error" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></small>
			</label>

			<label class="full">
				<span>Mật khẩu</span>
				<input type="password" th:field="*{password}" placeholder="Tối thiểu 6 ký tự">
				<small class="field-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></small>
			</label>

			<button class="full" type="submit">Đăng ký tài khoản</button>
		</form>

		<p class="auth-switch">
			Đã có tài khoản?
			<a th:href="@{/auth/login}">Đăng nhập</a>
		</p>
	</section>
</main>
</body>
</html>
