<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="promotionLayout(content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartShop Promotion Portal</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-50 font-sans antialiased text-slate-800">
<div class="flex min-h-screen overflow-hidden">
    <div th:replace="~{promotion/fragments/sidebar :: sidebar}"></div>

    <div class="flex-1 flex flex-col min-w-0 overflow-y-auto">
        <div th:replace="~{promotion/fragments/topbar :: topbar}"></div>

        <main class="flex-1 p-4 md:p-6 max-w-[1600px] w-full mx-auto">
            <div th:replace="${content}"></div>
        </main>
    </div>
</div>
</body>
</html>
