<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<body>
    <!-- ==============================
         HEADER SMARTSHOP – Phong cách Tiki (2 tầng)
         ============================== -->
    <header th:fragment="header" class="sticky top-0 z-50 bg-white shadow-md">

        <!-- ===== TẦNG 1: Logo + Search + Icons ===== -->
        <div class="bg-[#0A68FF]">
            <div class="max-w-7xl mx-auto px-4 flex items-center gap-6 h-14">

                <!-- 1a. Logo + Slogan -->
                <a href="/" class="flex flex-col shrink-0 leading-tight">
                    <span class="text-white text-[22px] font-bold tracking-tight">SmartShop</span>
                    <span class="text-white/70 text-[10px]">Mua sắm thông minh</span>
                </a>

                <!-- 1b. Thanh tìm kiếm lớn -->
                <form action="/products" method="get"
                      class="flex-1 flex items-center bg-white rounded-lg overflow-hidden shadow-sm focus-within:ring-2 focus-within:ring-white/60">
                    <input type="text"
                           name="q"
                           placeholder="Bạn muốn tìm gì hôm nay?"
                           class="flex-1 px-4 py-2 text-sm text-gray-700 outline-none placeholder:text-gray-400" />
                    <button type="submit"
                            class="bg-[#0A68FF] hover:bg-[#0959d9] text-white px-5 py-2 transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none"
                             viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                            <circle cx="11" cy="11" r="8"/>
                            <path stroke-linecap="round" d="m21 21-4.35-4.35"/>
                        </svg>
                    </button>
                </form>

                <!-- 1c. Icon: Trang chủ – Tài khoản – Giỏ hàng -->
                <nav class="flex items-center gap-5 shrink-0 text-white">
                    <!-- Trang chủ -->
                    <a href="/" class="flex flex-col items-center text-xs hover:opacity-80 transition" title="Trang chủ">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none"
                             viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                  d="M3 12l9-9 9 9M5 10v10a1 1 0 001 1h3a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1h3a1 1 0 001-1V10"/>
                        </svg>
                        <span class="mt-0.5">Trang chủ</span>
                    </a>

                    <!-- Tài khoản -->
                    <a th:href="${sessionUser != null} ? '/account' : '/auth/login'"
                       class="flex flex-col items-center text-xs hover:opacity-80 transition" title="Tài khoản">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none"
                             viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                            <circle cx="12" cy="8" r="4"/>
                            <path stroke-linecap="round" stroke-linejoin="round"
                                  d="M20 21a8 8 0 00-16 0"/>
                        </svg>
                        <span class="mt-0.5" th:text="${sessionUser != null} ? 'Tài khoản' : 'Đăng nhập'">Đăng nhập</span>
                    </a>

                    <!-- Giỏ hàng (có badge) -->
                    <a href="/cart" class="relative flex flex-col items-center text-xs hover:opacity-80 transition" title="Giỏ hàng">
                        <span class="absolute -top-1 -right-2 bg-red-500 text-white text-[10px] font-bold rounded-full min-w-[18px] h-[18px] flex items-center justify-center px-1"
                              th:if="${cartCount != null and cartCount > 0}"
                              th:text="${cartCount}">0</span>
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none"
                             viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                  d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13l-1.5 7.5a1 1 0 001 1.5h11a1 1 0 001-1.5L17 13M7 13V7a5 5 0 0110 0v6"/>
                        </svg>
                        <span class="mt-0.5">Giỏ hàng</span>
                    </a>
                </nav>
            </div>
        </div>

        <!-- ===== TẦNG 2: Menu danh mục ===== -->
        <nav class="bg-white border-b border-gray-100">
            <div class="max-w-7xl mx-auto px-4 flex items-center gap-1 h-10 overflow-x-auto scrollbar-hide">
                <a href="/products?category=thoi-trang"
                   class="shrink-0 px-4 py-2 text-sm text-gray-700 hover:text-[#0A68FF] hover:bg-blue-50 rounded-md transition-colors whitespace-nowrap">
                    Thời trang
                </a>
                <a href="/products?category=dien-tu"
                   class="shrink-0 px-4 py-2 text-sm text-gray-700 hover:text-[#0A68FF] hover:bg-blue-50 rounded-md transition-colors whitespace-nowrap">
                    Điện tử
                </a>
                <a href="/products?category=nha-cua"
                   class="shrink-0 px-4 py-2 text-sm text-gray-700 hover:text-[#0A68FF] hover:bg-blue-50 rounded-md transition-colors whitespace-nowrap">
                    Nhà cửa
                </a>
                <a href="/products?category=lam-dep"
                   class="shrink-0 px-4 py-2 text-sm text-gray-700 hover:text-[#0A68FF] hover:bg-blue-50 rounded-md transition-colors whitespace-nowrap">
                    Làm đẹp
                </a>
                <a href="/products?category=me-be"
                   class="shrink-0 px-4 py-2 text-sm text-gray-700 hover:text-[#0A68FF] hover:bg-blue-50 rounded-md transition-colors whitespace-nowrap">
                    Mẹ &amp; Bé
                </a>
                <a href="/products?category=thuc-pham"
                   class="shrink-0 px-4 py-2 text-sm text-gray-700 hover:text-[#0A68FF] hover:bg-blue-50 rounded-md transition-colors whitespace-nowrap">
                    Thực phẩm
                </a>
                <a href="/products?category=the-thao"
                   class="shrink-0 px-4 py-2 text-sm text-gray-700 hover:text-[#0A68FF] hover:bg-blue-50 rounded-md transition-colors whitespace-nowrap">
                    Thể thao
                </a>
                <a href="/products?category=sach"
                   class="shrink-0 px-4 py-2 text-sm text-gray-700 hover:text-[#0A68FF] hover:bg-blue-50 rounded-md transition-colors whitespace-nowrap">
                    Sách
                </a>
            </div>
        </nav>
    </header>
</body>
</html>
