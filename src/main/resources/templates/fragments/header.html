<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<body>
    <header th:fragment="header" class="sticky top-0 z-50 bg-[#0A68FF] shadow-lg">

        <!-- ===== TẦNG 1: Logo + Search + Icons ===== -->
        <div class="max-w-7xl mx-auto px-6">
            <div class="h-16 flex items-center gap-8">

                <!-- Logo + Slogan -->
                <a href="/" class="flex flex-col shrink-0 leading-none items-center">
                    <img src="/images/smartshop-logo.png" alt="SmartShop Logo" class="h-10 w-auto" />
                    <span class="text-white/80 text-xs font-medium">Mua sắm thông minh</span>
                </a>

                <!-- Thanh tìm kiếm lớn & đẹp -->
                <form action="/products" method="get" class="flex-1 max-w-2xl">
                    <div class="relative group">
                        <input type="text" 
                               name="q"
                               placeholder="Bạn muốn tìm gì hôm nay?"
                               class="w-full bg-white text-gray-700 placeholder-gray-400 rounded-3xl py-3.5 px-6 pl-14 text-base 
                                      focus:outline-none focus:ring-4 focus:ring-white/30 shadow-sm transition-all">
                        <div class="absolute left-6 top-1/2 -translate-y-1/2 text-gray-400">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" 
                                 viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
                                <circle cx="11" cy="11" r="8"/>
                                <path stroke-linecap="round" d="m21 21-4.35-4.35"/>
                            </svg>
                        </div>
                    </div>
                </form>

                <!-- Icons bên phải -->
                <nav class="flex items-center gap-8 text-white">

                    <!-- Trang chủ -->
                    <a href="/" 
                       class="flex flex-col items-center hover:opacity-80 transition-all hover:scale-105">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" 
                             viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.25">
                            <path stroke-linecap="round" stroke-linejoin="round" 
                                  d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1v-5m10-10l2 2m-2-2v10a1 1 0 01-1 1v-5m-6 0a1 1 0 001-1v5"/>
                        </svg>
                        <span class="text-xs mt-1 font-medium">Trang chủ</span>
                    </a>

                    <!-- Tài khoản -->
                    <a th:href="${sessionUser != null} ? '#' : '/auth/login'" 
                       class="flex flex-col items-center hover:opacity-80 transition-all hover:scale-105">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" 
                             viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.25">
                            <path stroke-linecap="round" stroke-linejoin="round" 
                                  d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                        </svg>
                        <span class="text-xs mt-1 font-medium" th:text="${sessionUser != null} ? 'Tài khoản' : 'Đăng nhập'">Đăng nhập</span>
                    </a>

                    <!-- Giỏ hàng -->
                    <a href="/cart" 
                       class="relative flex flex-col items-center hover:opacity-80 transition-all hover:scale-105">
                        <span class="absolute -top-1 -right-2 bg-red-500 text-white text-[10px] font-bold 
                                     rounded-full min-w-[18px] h-[18px] flex items-center justify-center px-1"
                              th:if="${cartCount != null and cartCount > 0}"
                              th:text="${cartCount}">0</span>
                        
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" 
                             viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.25">
                            <path stroke-linecap="round" stroke-linejoin="round" 
                                  d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 21H18.6L20 13H7z"/>
                            <path stroke-linecap="round" stroke-linejoin="round" 
                                  d="M16 21a2 2 0 100-4 2 2 0 000 4zM7 21a2 2 0 100-4 2 2 0 000 4z"/>
                        </svg>
                        <span class="text-xs mt-1 font-medium">Giỏ hàng</span>
                    </a>
                </nav>
            </div>
        </div>

        <!-- ===== TẦNG 2: Menu danh mục ===== -->
        <nav class="bg-white border-t border-white/10 shadow-sm">
            <div class="max-w-7xl mx-auto px-6">
                <div class="flex items-center h-12 gap-1 overflow-x-auto scrollbar-hide text-sm font-medium">
                    
                    <a href="/products?category=thoi-trang" 
                       class="px-6 py-2.5 text-gray-700 hover:text-[#0A68FF] hover:bg-blue-50 rounded-2xl transition-all whitespace-nowrap">
                        Thời trang
                    </a>
                    <a href="/products?category=dien-tu" 
                       class="px-6 py-2.5 text-gray-700 hover:text-[#0A68FF] hover:bg-blue-50 rounded-2xl transition-all whitespace-nowrap">
                        Điện tử
                    </a>
                    <a href="/products?category=nha-cua" 
                       class="px-6 py-2.5 text-gray-700 hover:text-[#0A68FF] hover:bg-blue-50 rounded-2xl transition-all whitespace-nowrap">
                        Nhà cửa
                    </a>
                    <a href="/products?category=lam-dep" 
                       class="px-6 py-2.5 text-gray-700 hover:text-[#0A68FF] hover:bg-blue-50 rounded-2xl transition-all whitespace-nowrap">
                        Làm đẹp
                    </a>
                    <a href="/products?category=me-be" 
                       class="px-6 py-2.5 text-gray-700 hover:text-[#0A68FF] hover:bg-blue-50 rounded-2xl transition-all whitespace-nowrap">
                        Mẹ & Bé
                    </a>
                    <a href="/products?category=thuc-pham" 
                       class="px-6 py-2.5 text-gray-700 hover:text-[#0A68FF] hover:bg-blue-50 rounded-2xl transition-all whitespace-nowrap">
                        Thực phẩm
                    </a>
                    <a href="/products?category=the-thao" 
                       class="px-6 py-2.5 text-gray-700 hover:text-[#0A68FF] hover:bg-blue-50 rounded-2xl transition-all whitespace-nowrap">
                        Thể thao
                    </a>
                    <a href="/products?category=sach" 
                       class="px-6 py-2.5 text-gray-700 hover:text-[#0A68FF] hover:bg-blue-50 rounded-2xl transition-all whitespace-nowrap">
                        Sách
                    </a>
                </div>
            </div>
        </nav>
    </header>
</body>
</html>
