<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{admin/fragments/layout :: adminLayout(~{::main})}">
<body>
<main>
    <div class="mb-6 flex items-start justify-between gap-4">
        <div>
            <h1 class="text-2xl font-bold text-slate-900">Quản lý đơn hàng</h1>
            <p class="text-sm text-slate-500">Theo dõi giao hàng và cập nhật trạng thái đơn.</p>
        </div>
        <form method="get" th:action="@{/admin/orders}" class="flex items-center gap-2">
            <select name="status" class="rounded-lg border border-slate-200 bg-white px-3 py-2 text-sm">
                <option value="">Tất cả trạng thái</option>
                <option th:each="status : ${statuses}" th:value="${status}" th:selected="${selectedStatus == status}" th:text="${status}">PENDING</option>
            </select>
            <button class="rounded-lg bg-indigo-600 px-4 py-2 text-sm font-semibold text-white hover:bg-indigo-700" type="submit">Lọc</button>
        </form>
    </div>

    <div th:if="${successMessage}" class="mb-4 rounded-lg border border-emerald-200 bg-emerald-50 px-4 py-3 text-sm text-emerald-700" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="mb-4 rounded-lg border border-rose-200 bg-rose-50 px-4 py-3 text-sm text-rose-700" th:text="${errorMessage}"></div>

    <div class="overflow-hidden rounded-xl border border-slate-200 bg-white shadow-sm">
        <table class="w-full text-left text-sm">
            <thead class="bg-slate-50 text-xs font-semibold uppercase text-slate-400">
            <tr>
                <th class="p-4">Mã đơn</th>
                <th class="p-4">Shop</th>
                <th class="p-4">Khách hàng</th>
                <th class="p-4">Tổng tiền</th>
                <th class="p-4">Thanh toán</th>
                <th class="p-4">Trạng thái</th>
                <th class="p-4">Ngày tạo</th>
                <th class="p-4">Thao tác</th>
            </tr>
            </thead>
            <tbody class="divide-y divide-slate-100">
            <tr th:each="order : ${orders.content}">
                <td class="p-4 font-semibold text-slate-900" th:text="${order.code}">ORD</td>
                <td class="p-4 text-slate-600" th:text="${order.shop.name}">Shop</td>
                <td class="p-4 text-slate-600" th:text="${order.user.fullName != null ? order.user.fullName : order.user.email}">User</td>
                <td class="p-4 text-slate-900" th:text="${#numbers.formatDecimal(order.finalAmount, 0, 'COMMA', 0, 'POINT') + ' đ'}">0 đ</td>
                <td class="p-4 text-slate-600" th:text="${order.paymentStatus}">UNPAID</td>
                <td class="p-4"><span class="rounded bg-indigo-50 px-2 py-1 text-xs font-semibold text-indigo-700" th:text="${order.status}">PENDING</span></td>
                <td class="p-4 text-slate-500" th:text="${#temporals.format(order.createdAt, 'dd/MM/yyyy HH:mm')}">date</td>
                <td class="p-4"><a th:href="@{/admin/orders/{id}(id=${order.id})}" class="rounded bg-slate-800 px-3 py-1.5 text-xs font-semibold text-white hover:bg-slate-700">Chi tiết</a></td>
            </tr>
            <tr th:if="${orders.empty}"><td colspan="8" class="p-4 text-slate-500">Không có đơn hàng phù hợp.</td></tr>
            </tbody>
        </table>
    </div>
</main>
</body>
</html>
