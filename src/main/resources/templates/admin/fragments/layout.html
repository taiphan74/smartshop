<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="adminLayout(content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartShop Admin Portal</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <!-- Hỗ trợ fallback Tailwind CDN nếu app.css chưa build kịp nguyên khối -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="admin-shell antialiased">
    <div class="flex min-h-screen overflow-hidden">
        <div th:replace="~{admin/fragments/sidebar :: sidebar}"></div>

        <div class="admin-content-shell overflow-y-auto">
            <div th:replace="~{admin/fragments/topbar :: topbar}"></div>

            <main class="admin-page">
                <div th:replace="${content}"></div>
            </main>
        </div>
    </div>
</body>
</html>
