<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="adminLayout(content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartShop Admin Portal</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <!-- Hỗ trợ fallback Tailwind CDN nếu app.css chưa build kịp nguyên khối -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-50 font-sans antialiased text-slate-800">
    <div class="flex min-h-screen overflow-hidden">
        <!-- Sidebar Navigation -->
        <div th:replace="~{admin/fragments/sidebar :: sidebar}"></div>
        
        <!-- Content Container -->
        <div class="flex-1 flex flex-col min-w-0 overflow-y-auto">
            <!-- Topbar Utility -->
            <div th:replace="~{admin/fragments/topbar :: topbar}"></div>
            
            <!-- Dynamic Main Content -->
            <main class="flex-1 p-6 max-w-[1600px] w-full mx-auto">
                <div th:replace="${content}"></div>
            </main>
        </div>
    </div>
</body>
</html>
