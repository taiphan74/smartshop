<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<body>
    <div th:fragment="topbar" class="h-16 bg-white dark:bg-gray-900 border-b border-gray-200 dark:border-gray-700 flex items-center justify-between px-6 shadow-sm">
        <div class="flex items-center gap-6">
            <div class="relative">
                <button id="content-dropdown" class="flex items-center gap-2 px-3 py-2 text-sm font-medium bg-white dark:bg-gray-800 rounded-md shadow-sm border border-gray-300 dark:border-gray-600">
                    <span>Banners</span>
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/>
                    </svg>
                </button>
                <div id="dropdown-menu" class="absolute left-0 mt-2 w-48 bg-white dark:bg-gray-800 rounded-md shadow-lg py-1 hidden z-10 border border-gray-200 dark:border-gray-700">
                    <a href="/admin/banners" class="block px-4 py-2 text-sm text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700">Banners</a>
                    <a href="/admin/products" class="block px-4 py-2 text-sm text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700">Sản phẩm</a>
                    <a href="/admin/categories" class="block px-4 py-2 text-sm text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700">Danh mục</a>
                    <a href="/admin/orders" class="block px-4 py-2 text-sm text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700">Đơn hàng</a>
                </div>
            </div>
            <a href="/admin/banners/create" class="px-3 py-1.5 text-sm font-medium bg-blue-600 text-white rounded-md hover:bg-blue-700">
                + Thêm mới
            </a>
        </div>

        <div class="flex items-center gap-4">
            <button id="theme-toggle" class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800" aria-label="Toggle theme">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
                </svg>
            </button>
            <div class="flex items-center gap-2">
                <span class="w-8 h-8 rounded-full bg-indigo-100 dark:bg-indigo-900 text-indigo-700 dark:text-indigo-200 flex items-center justify-center font-bold text-sm">A</span>
            </div>
        </div>
    </div>

    <script>
        // Dropdown toggle
        document.getElementById('content-dropdown').addEventListener('click', function() {
            document.getElementById('dropdown-menu').classList.toggle('hidden');
        });

        // Close dropdown when clicking outside
        document.addEventListener('click', function(event) {
            if (!event.target.closest('#content-dropdown') && !event.target.closest('#dropdown-menu')) {
                document.getElementById('dropdown-menu').classList.add('hidden');
            }
        });

        // Theme toggle
        document.getElementById('theme-toggle').addEventListener('click', function() {
            const currentTheme = document.documentElement.getAttribute('data-theme') || 'light';
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('smartshop-theme', newTheme);
        });

        // Keyboard shortcuts
        document.addEventListener('keydown', function(e) {
            // G then N for new banner
            if (e.key === 'g' && !e.ctrlKey && !e.metaKey && !e.altKey) {
                document.addEventListener('keydown', function handleSecondKey(e2) {
                    if (e2.key === 'n') {
                        window.location.href = '/admin/banners/create';
                    }
                    document.removeEventListener('keydown', handleSecondKey);
                }, {once: true});
            }

            // ⌘K for search focus
            if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
                e.preventDefault();
                const searchInput = document.querySelector('[type="search"]');
                if (searchInput) searchInput.focus();
            }

            // ⌘/ for shortcuts help
            if ((e.metaKey || e.ctrlKey) && e.key === '/') {
                e.preventDefault();
                showShortcutsModal();
            }
        });

        function showShortcutsModal() {
            const modal = document.createElement('div');
            modal.innerHTML = `
                <div class="fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50">
                    <div class="bg-white dark:bg-gray-900 rounded-lg shadow-xl max-w-md w-full max-h-[80vh] overflow-y-auto">
                        <div class="p-6">
                            <div class="flex justify-between items-center mb-4">
                                <h2 class="text-lg font-semibold text-gray-900 dark:text-white">Phím tắt</h2>
                                <button id="close-modal" class="p-1 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                                    </svg>
                                </button>
                            </div>
                            <div class="grid grid-cols-2 gap-3 text-sm">
                                <div class="flex items-center gap-2">
                                    <kbd class="kbd">G</kbd> <kbd class="kbd">N</kbd>
                                    <span class="text-gray-600 dark:text-gray-300">Thêm banner mới</span>
                                </div>
                                <div class="flex items-center gap-2">
                                    <kbd class="kbd">⌘</kbd> <kbd class="kbd">K</kbd>
                                    <span class="text-gray-600 dark:text-gray-300">Tìm kiếm</span>
                                </div>
                                <div class="flex items-center gap-2">
                                    <kbd class="kbd">⌘</kbd> <kbd class="kbd">/</kbd>
                                    <span class="text-gray-600 dark:text-gray-300">Hiển thị phím tắt</span>
                                </div>
                                <div class="flex items-center gap-2">
                                    <kbd class="kbd">Esc</kbd>
                                    <span class="text-gray-600 dark:text-gray-300">Đóng modal</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
            modal.querySelector('#close-modal').addEventListener('click', function() {
                modal.remove();
            });
        }

        // Add kbd styling
        const style = document.createElement('style');
        style.textContent = `
            .kbd {
                display: inline-block;
                padding: 0.2rem 0.4rem;
                font-family: monospace;
                font-size: 0.85em;
                background: #f3f4f6;
                border: 1px solid #d1d5db;
                border-radius: 0.25rem;
                color: #1f2937;
                box-shadow: inset 0 -1px 0 #9ca3af;
            }
            .dark .kbd {
                background: #374151;
                border-color: #4b5563;
                color: #f9fafb;
                box-shadow: inset 0 -1px 0 #6b7280;
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
