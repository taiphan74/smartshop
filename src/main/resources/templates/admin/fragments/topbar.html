<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<body>
    <div th:fragment="topbar" class="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-6 shadow-sm">
        <div class="flex items-center gap-6">
            <div class="relative">
                <button id="content-dropdown" class="flex items-center gap-2 px-3 py-2 text-sm font-medium bg-white rounded-md shadow-sm border border-gray-300">
                    <span>Điều hướng nhanh</span>
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/>
                    </svg>
                </button>
                <div id="dropdown-menu" class="absolute left-0 mt-2 w-48 bg-white rounded-md shadow-lg py-1 hidden z-10 border border-gray-200">
                    <a href="/admin/dashboard" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">Tổng quan</a>
                    <a href="/admin/products" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">Sản phẩm</a>
                    <a href="/admin/categories" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">Danh mục</a>
                    <a href="/admin/banners" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">Banners</a>
                    <a href="/admin/shops" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">Shop</a>
                    <a href="/admin/orders" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">Đơn hàng</a>
                    <a href="/admin/reviews" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">Feedback</a>
                </div>
            </div>
        </div>

        <div class="flex items-center gap-4">
            <span class="text-sm text-slate-500">Admin</span>
            <div class="flex items-center gap-2">
                <span class="w-8 h-8 rounded-full bg-indigo-100 text-indigo-700 flex items-center justify-center font-bold text-sm">A</span>
            </div>
        </div>
    </div>

    <script>
        // Dropdown toggle
        document.getElementById('content-dropdown').addEventListener('click', function() {
            document.getElementById('dropdown-menu').classList.toggle('hidden');
        });

        // Close dropdown when clicking outside
        document.addEventListener('click', function(event) {
            if (!event.target.closest('#content-dropdown') && !event.target.closest('#dropdown-menu')) {
                document.getElementById('dropdown-menu').classList.add('hidden');
            }
        });
    </script>
</body>
</html>
