<div th:fragment="topbar" class="admin-topbar">
    <div class="flex items-center gap-4">
        <div class="relative">
            <button id="content-dropdown" class="admin-btn-secondary" type="button">
                <span>Điều hướng nhanh</span>
                <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/>
                </svg>
            </button>
            <div id="dropdown-menu" class="absolute left-0 z-30 mt-3 hidden w-56 overflow-hidden rounded-2xl border border-slate-200 bg-white py-2 shadow-xl">
                <a href="/admin/dashboard" class="block px-4 py-2 text-sm font-semibold text-slate-700 hover:bg-blue-50 hover:text-blue-700">Tổng quan</a>
                <a href="/admin/products" class="block px-4 py-2 text-sm font-semibold text-slate-700 hover:bg-blue-50 hover:text-blue-700">Sản phẩm</a>
                <a href="/admin/categories" class="block px-4 py-2 text-sm font-semibold text-slate-700 hover:bg-blue-50 hover:text-blue-700">Danh mục</a>
                <a href="/admin/banners" class="block px-4 py-2 text-sm font-semibold text-slate-700 hover:bg-blue-50 hover:text-blue-700">Banners</a>
                <a href="/admin/shops" class="block px-4 py-2 text-sm font-semibold text-slate-700 hover:bg-blue-50 hover:text-blue-700">Shop</a>
                <a href="/admin/orders" class="block px-4 py-2 text-sm font-semibold text-slate-700 hover:bg-blue-50 hover:text-blue-700">Đơn hàng</a>
                <a href="/admin/reviews" class="block px-4 py-2 text-sm font-semibold text-slate-700 hover:bg-blue-50 hover:text-blue-700">Feedback</a>
            </div>
        </div>
    </div>

    <div class="flex items-center gap-3">
        <span class="text-sm font-semibold text-slate-700">Admin</span>
        <span class="grid h-9 w-9 place-items-center rounded-2xl bg-blue-100 text-sm font-black text-blue-700">A</span>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const button = document.getElementById('content-dropdown');
        const menu = document.getElementById('dropdown-menu');
        if (!button || !menu) return;

        button.addEventListener('click', function() {
            menu.classList.toggle('hidden');
        });

        document.addEventListener('click', function(event) {
            if (!event.target.closest('#content-dropdown') && !event.target.closest('#dropdown-menu')) {
                menu.classList.add('hidden');
            }
        });
    });
</script>
