<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{admin/fragments/layout :: adminLayout(~{::main})}">
<body><main>
<div class="mb-6"><a th:href="@{/admin/products}" class="text-sm font-semibold text-indigo-600">← Quay lại sản phẩm</a><h1 class="mt-2 text-2xl font-bold text-slate-900" th:text="${product == null ? 'Thêm sản phẩm' : 'Sửa sản phẩm'}">Form</h1></div>
<form th:action="${product == null ? '/admin/products' : '/admin/products/' + product.id + '/edit'}" th:object="${form}" method="post" class="max-w-3xl rounded-xl border border-slate-200 bg-white p-6 shadow-sm">
<div th:if="${#fields.hasGlobalErrors()}" class="mb-4 rounded border border-rose-200 bg-rose-50 px-4 py-3 text-sm text-rose-700" th:each="err : ${#fields.globalErrors()}" th:text="${err}"></div>
<div class="grid gap-4 md:grid-cols-2">
<label class="text-sm font-semibold text-slate-700">Tên<input th:field="*{name}" class="mt-1 w-full rounded border px-3 py-2"><span th:errors="*{name}" class="text-xs text-rose-600"></span></label>
<label class="text-sm font-semibold text-slate-700">Slug<input th:field="*{slug}" class="mt-1 w-full rounded border px-3 py-2"><span th:errors="*{slug}" class="text-xs text-rose-600"></span></label>
<label class="text-sm font-semibold text-slate-700">Shop<select th:field="*{shopId}" class="mt-1 w-full rounded border px-3 py-2"><option th:each="shop : ${shops}" th:value="${shop.id}" th:text="${shop.name}">Shop</option></select></label>
<label class="text-sm font-semibold text-slate-700">Danh mục<select th:field="*{categoryId}" class="mt-1 w-full rounded border px-3 py-2"><option th:each="category : ${categories}" th:value="${category.id}" th:text="${category.name}">Category</option></select></label>
<label class="text-sm font-semibold text-slate-700">Trạng thái<select th:field="*{status}" class="mt-1 w-full rounded border px-3 py-2"><option value="true">Hiện</option><option value="false">Ẩn</option></select></label>
<label class="text-sm font-semibold text-slate-700 md:col-span-2">Mô tả<textarea th:field="*{description}" rows="5" class="mt-1 w-full rounded border px-3 py-2"></textarea></label>
</div><div class="mt-6 flex justify-end gap-2"><a th:href="@{/admin/products}" class="rounded border px-4 py-2 text-sm font-semibold">Hủy</a><button class="rounded bg-indigo-600 px-4 py-2 text-sm font-semibold text-white">Lưu</button></div>
</form>
</main></body></html>
