<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{admin/fragments/layout :: adminLayout(~{::main})}">
<body><main>
<div class="mb-6 flex items-start justify-between"><div><a th:href="@{/admin/products}" class="text-sm font-semibold text-indigo-600">← Quay lại sản phẩm</a><h1 class="mt-2 text-2xl font-bold text-slate-900" th:text="${product.name}">Product</h1></div><a th:href="@{/admin/products/{id}/edit(id=${product.id})}" class="rounded bg-indigo-600 px-4 py-2 text-sm font-semibold text-white">Sửa</a></div>
<div th:if="${successMessage}" class="mb-4 rounded-lg border border-emerald-200 bg-emerald-50 px-4 py-3 text-sm text-emerald-700" th:text="${successMessage}"></div><div th:if="${errorMessage}" class="mb-4 rounded-lg border border-rose-200 bg-rose-50 px-4 py-3 text-sm text-rose-700" th:text="${errorMessage}"></div>
<div class="grid gap-6 lg:grid-cols-[1fr_340px]"><section class="space-y-6">
<div class="rounded-xl border bg-white p-6 shadow-sm"><dl class="grid gap-4 text-sm md:grid-cols-2"><div><dt class="font-semibold text-slate-500">Slug</dt><dd th:text="${product.slug}">slug</dd></div><div><dt class="font-semibold text-slate-500">Trạng thái</dt><dd th:text="${product.status ? 'Đang hiện' : 'Đã ẩn'}">status</dd></div><div><dt class="font-semibold text-slate-500">Shop</dt><dd th:text="${product.shop.name}">shop</dd></div><div><dt class="font-semibold text-slate-500">Danh mục</dt><dd th:text="${product.category.name}">cat</dd></div><div class="md:col-span-2"><dt class="font-semibold text-slate-500">Mô tả</dt><dd class="whitespace-pre-line" th:text="${product.description ?: 'Chưa có'}">desc</dd></div></dl></div>
<div class="rounded-xl border bg-white p-6 shadow-sm"><h2 class="mb-4 font-bold">Variants</h2><table class="w-full text-left text-sm"><tbody><tr th:each="variant : ${variants}" class="border-t"><td class="py-2" th:text="${variant.sku}">SKU</td><td th:text="${#numbers.formatDecimal(variant.price,0,'COMMA',0,'POINT') + ' đ'}">price</td><td th:text="${variant.stockQuantity}">stock</td><td><form th:action="@{/admin/products/{pid}/variants/{vid}/delete(pid=${product.id},vid=${variant.id})}" method="post"><button class="text-xs font-semibold text-rose-600">Xóa</button></form></td></tr></tbody></table></div>
<div class="rounded-xl border bg-white p-6 shadow-sm"><h2 class="mb-4 font-bold">Ảnh</h2><div class="grid gap-3 md:grid-cols-3"><div th:each="image : ${images}" class="rounded border p-2"><img th:src="${image.imageUrl}" class="h-28 w-full object-cover"><p class="mt-1 text-xs" th:text="${image.isMain ? 'Ảnh chính' : 'Ảnh phụ'}">main</p><form th:action="@{/admin/products/{pid}/images/{iid}/delete(pid=${product.id},iid=${image.id})}" method="post"><button class="text-xs font-semibold text-rose-600">Xóa</button></form></div></div></div>
</section><aside class="space-y-4">
<div class="rounded-xl border bg-white p-5 shadow-sm"><h2 class="font-bold">Thêm variant</h2><form th:action="@{/admin/products/{id}/variants(id=${product.id})}" th:object="${variantForm}" method="post" class="mt-3 space-y-2"><input th:field="*{sku}" placeholder="SKU" class="w-full rounded border px-3 py-2"><input th:field="*{price}" placeholder="Giá" class="w-full rounded border px-3 py-2"><input th:field="*{stockQuantity}" placeholder="Tồn kho" class="w-full rounded border px-3 py-2"><input th:field="*{thumbnailUrl}" placeholder="Thumbnail URL" class="w-full rounded border px-3 py-2"><input type="hidden" th:field="*{status}" value="true"><button class="w-full rounded bg-indigo-600 px-3 py-2 text-sm font-semibold text-white">Thêm</button></form></div>
<div class="rounded-xl border bg-white p-5 shadow-sm"><h2 class="font-bold">Thêm ảnh</h2><form th:action="@{/admin/products/{id}/images(id=${product.id})}" th:object="${imageForm}" method="post" class="mt-3 space-y-2"><input th:field="*{imageUrl}" placeholder="Image URL" class="w-full rounded border px-3 py-2"><input th:field="*{sortOrder}" placeholder="Thứ tự" class="w-full rounded border px-3 py-2"><label class="flex gap-2 text-sm"><input type="checkbox" th:field="*{main}"> Ảnh chính</label><button class="w-full rounded bg-indigo-600 px-3 py-2 text-sm font-semibold text-white">Thêm</button></form></div>
<div class="rounded-xl border bg-white p-5 shadow-sm"><form th:if="${product.status}" th:action="@{/admin/products/{id}/hide(id=${product.id})}" method="post"><button class="w-full rounded bg-amber-600 px-3 py-2 text-sm font-semibold text-white">Ẩn</button></form><form th:unless="${product.status}" th:action="@{/admin/products/{id}/show(id=${product.id})}" method="post"><button class="w-full rounded bg-emerald-600 px-3 py-2 text-sm font-semibold text-white">Hiện</button></form></div>
<div class="rounded-xl border border-rose-200 bg-rose-50 p-5"><h2 class="font-bold text-rose-900">Danger zone</h2><form th:action="@{/admin/products/{id}/delete(id=${product.id})}" method="post" class="mt-3" onsubmit="return confirm('Xóa vĩnh viễn sản phẩm này?');"><button class="w-full rounded bg-rose-600 px-3 py-2 text-sm font-semibold text-white">Xóa vĩnh viễn</button></form></div>
</aside></div>
</main></body></html>
