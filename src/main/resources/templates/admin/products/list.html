<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{admin/fragments/layout :: adminLayout(~{::main})}">
<body><main>
<div class="admin-page-header">
    <div>
        <h1 class="admin-page-title">Quản lý sản phẩm</h1>
        <p class="admin-page-subtitle">CRUD sản phẩm, variant và ảnh.</p>
    </div>
    <a th:href="@{/admin/products/new}" class="admin-btn-primary">Thêm sản phẩm</a>
</div>

<div th:if="${successMessage}" class="admin-alert-success" th:text="${successMessage}"></div>

<div class="admin-table-wrap">
    <table class="admin-table">
        <thead>
            <tr>
                <th class="p-4">Sản phẩm</th>
                <th class="p-4">Shop</th>
                <th class="p-4">Danh mục</th>
                <th class="p-4">Rating</th>
                <th class="p-4">Trạng thái</th>
                <th class="p-4">Thao tác</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="product : ${products.content}">
                <td class="p-4">
                    <a class="font-semibold text-indigo-700 hover:text-indigo-900" th:href="@{/admin/products/{id}(id=${product.id})}" th:text="${product.name}">Product</a>
                    <p class="text-xs text-slate-500 mt-1" th:text="${product.slug}">slug</p>
                </td>
                <td class="p-4 text-slate-600" th:text="${product.shop.name}">Shop</td>
                <td class="p-4 text-slate-600" th:text="${product.category.name}">Category</td>
                <td class="p-4 text-amber-600 font-semibold" th:text="${product.averageRating + ' (' + product.reviewCount + ')'}">0</td>
                <td class="p-4">
                    <span th:if="${product.status}" class="admin-badge-success">Đang hiện</span>
                    <span th:unless="${product.status}" class="admin-badge-neutral">Đã ẩn</span>
                </td>
                <td class="p-4">
                    <a th:href="@{/admin/products/{id}(id=${product.id})}" class="admin-btn-secondary text-sm">Chi tiết</a>
                </td>
            </tr>
            <tr th:if="${products.empty}">
                <td class="p-4 admin-empty" colspan="6">Không có sản phẩm.</td>
            </tr>
        </tbody>
    </table>
</div>
</main></body>
</html>
