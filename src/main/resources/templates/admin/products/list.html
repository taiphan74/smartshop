<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{admin/fragments/layout :: adminLayout(~{::main})}">
<body><main>
<div class="mb-6 flex items-start justify-between gap-4">
    <div><h1 class="text-2xl font-bold text-slate-900">Quản lý sản phẩm</h1><p class="text-sm text-slate-500">CRUD sản phẩm, variant và ảnh.</p></div>
    <a th:href="@{/admin/products/new}" class="rounded-lg bg-indigo-600 px-4 py-2 text-sm font-semibold text-white hover:bg-indigo-700">Thêm sản phẩm</a>
</div>
<div th:if="${successMessage}" class="mb-4 rounded-lg border border-emerald-200 bg-emerald-50 px-4 py-3 text-sm text-emerald-700" th:text="${successMessage}"></div>
<div class="overflow-hidden rounded-xl border border-slate-200 bg-white shadow-sm">
<table class="w-full text-left text-sm"><thead class="bg-slate-50 text-xs font-semibold uppercase text-slate-400"><tr><th class="p-4">Sản phẩm</th><th class="p-4">Shop</th><th class="p-4">Danh mục</th><th class="p-4">Rating</th><th class="p-4">Trạng thái</th><th class="p-4">Thao tác</th></tr></thead>
<tbody class="divide-y divide-slate-100"><tr th:each="product : ${products.content}">
<td class="p-4"><a class="font-semibold text-indigo-700" th:href="@{/admin/products/{id}(id=${product.id})}" th:text="${product.name}">Product</a><p class="text-xs text-slate-500" th:text="${product.slug}">slug</p></td>
<td class="p-4" th:text="${product.shop.name}">Shop</td><td class="p-4" th:text="${product.category.name}">Category</td><td class="p-4" th:text="${product.averageRating + ' (' + product.reviewCount + ')'}">0</td>
<td class="p-4"><span th:text="${product.status ? 'Đang hiện' : 'Đã ẩn'}" class="rounded bg-slate-100 px-2 py-1 text-xs font-semibold text-slate-700">Status</span></td>
<td class="p-4"><a th:href="@{/admin/products/{id}(id=${product.id})}" class="rounded bg-slate-800 px-3 py-1.5 text-xs font-semibold text-white">Chi tiết</a></td>
</tr><tr th:if="${products.empty}"><td colspan="6" class="p-4 text-slate-500">Không có sản phẩm.</td></tr></tbody></table>
</div>
</main></body></html>
