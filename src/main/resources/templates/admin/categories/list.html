<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{admin/fragments/layout :: adminLayout(~{::main})}">
<body><main>
<div class="mb-6 flex items-start justify-between"><div><h1 class="text-2xl font-bold text-slate-900">Quản lý danh mục</h1><p class="text-sm text-slate-500">CRUD category theo path/level.</p></div><a th:href="@{/admin/categories/new}" class="rounded bg-indigo-600 px-4 py-2 text-sm font-semibold text-white">Thêm danh mục</a></div>
<div th:if="${successMessage}" class="mb-4 rounded-lg border border-emerald-200 bg-emerald-50 px-4 py-3 text-sm text-emerald-700" th:text="${successMessage}"></div><div th:if="${errorMessage}" class="mb-4 rounded-lg border border-rose-200 bg-rose-50 px-4 py-3 text-sm text-rose-700" th:text="${errorMessage}"></div>
<div class="overflow-hidden rounded-xl border bg-white shadow-sm"><table class="w-full text-left text-sm"><thead class="bg-slate-50 text-xs font-semibold uppercase text-slate-400"><tr><th class="p-4">Tên</th><th class="p-4">Slug</th><th class="p-4">Path</th><th class="p-4">Level</th><th class="p-4">Thao tác</th></tr></thead><tbody class="divide-y divide-slate-100"><tr th:each="category : ${categories.content}"><td class="p-4 font-semibold" th:text="${category.name}">Name</td><td class="p-4" th:text="${category.slug}">slug</td><td class="p-4" th:text="${category.path}">path</td><td class="p-4" th:text="${category.level}">0</td><td class="p-4 flex gap-2"><a th:href="@{/admin/categories/{id}/edit(id=${category.id})}" class="rounded bg-slate-800 px-3 py-1.5 text-xs font-semibold text-white">Sửa</a><form th:action="@{/admin/categories/{id}/delete(id=${category.id})}" method="post" onsubmit="return confirm('Xóa danh mục này?');"><button class="rounded bg-rose-600 px-3 py-1.5 text-xs font-semibold text-white">Xóa</button></form></td></tr><tr th:if="${categories.empty}"><td colspan="5" class="p-4 text-slate-500">Không có danh mục.</td></tr></tbody></table></div>
</main></body></html>
