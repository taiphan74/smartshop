<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{admin/fragments/layout :: adminLayout(~{::main})}">
<body><main>
<div class="admin-page-header">
    <div>
        <h1 class="admin-page-title">Quản lý danh mục</h1>
        <p class="admin-page-subtitle">CRUD category theo path/level.</p>
    </div>
    <a th:href="@{/admin/categories/new}" class="admin-btn-primary">Thêm danh mục</a>
</div>

<div th:if="${successMessage}" class="admin-alert-success" th:text="${successMessage}"></div>
<div th:if="${errorMessage}" class="admin-alert-danger" th:text="${errorMessage}"></div>

<div class="admin-table-wrap">
    <table class="admin-table">
        <thead>
            <tr>
                <th class="p-4">Tên</th>
                <th class="p-4">Slug</th>
                <th class="p-4">Path</th>
                <th class="p-4">Level</th>
                <th class="p-4">Thao tác</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="category : ${categories.content}">
                <td class="p-4 font-semibold text-slate-800" th:text="${category.name}">Name</td>
                <td class="p-4 text-slate-600" th:text="${category.slug}">slug</td>
                <td class="p-4 text-slate-600" th:text="${category.path}">path</td>
                <td class="p-4 text-slate-600" th:text="${category.level}">0</td>
                <td class="p-4 flex gap-2">
                    <a th:href="@{/admin/categories/{id}/edit(id=${category.id})}" class="admin-btn-secondary text-sm">Sửa</a>
                    <form th:action="@{/admin/categories/{id}/delete(id=${category.id})}" method="post" onsubmit="return confirm('Xóa danh mục này?');">
                        <button type="submit" class="admin-btn-danger text-sm">Xóa</button>
                    </form>
                </td>
            </tr>
            <tr th:if="${categories.empty}">
                <td class="p-4 admin-empty" colspan="5">Không có danh mục.</td>
            </tr>
        </tbody>
    </table>
</div>
</main></body>
</html>
