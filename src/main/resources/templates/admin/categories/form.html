<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{admin/fragments/layout :: adminLayout(~{::main})}">
<body><main>
<div class="mb-6"><a th:href="@{/admin/categories}" class="text-sm font-semibold text-indigo-600">← Quay lại danh mục</a><h1 class="mt-2 text-2xl font-bold text-slate-900" th:text="${category == null ? 'Thêm danh mục' : 'Sửa danh mục'}">Form</h1></div>
<form th:action="${category == null ? '/admin/categories' : '/admin/categories/' + category.id + '/edit'}" th:object="${form}" method="post" class="max-w-3xl rounded-xl border bg-white p-6 shadow-sm">
<div th:if="${#fields.hasGlobalErrors()}" class="mb-4 rounded border border-rose-200 bg-rose-50 px-4 py-3 text-sm text-rose-700" th:each="err : ${#fields.globalErrors()}" th:text="${err}"></div>
<div class="grid gap-4 md:grid-cols-2">
<label class="text-sm font-semibold text-slate-700">Tên<input th:field="*{name}" class="mt-1 w-full rounded border px-3 py-2"><span th:errors="*{name}" class="text-xs text-rose-600"></span></label>
<label class="text-sm font-semibold text-slate-700">Slug<input th:field="*{slug}" class="mt-1 w-full rounded border px-3 py-2"><span th:errors="*{slug}" class="text-xs text-rose-600"></span></label>
<label class="text-sm font-semibold text-slate-700">Path<input th:field="*{path}" class="mt-1 w-full rounded border px-3 py-2"><span th:errors="*{path}" class="text-xs text-rose-600"></span></label>
<label class="text-sm font-semibold text-slate-700">Level<input th:field="*{level}" type="number" min="0" class="mt-1 w-full rounded border px-3 py-2"><span th:errors="*{level}" class="text-xs text-rose-600"></span></label>
<label class="text-sm font-semibold text-slate-700 md:col-span-2">Danh mục cha<select th:field="*{parentId}" class="mt-1 w-full rounded border px-3 py-2"><option value="">Không có</option><option th:each="parent : ${parentCategories}" th:value="${parent.id}" th:text="${parent.path}">parent</option></select></label>
</div><div class="mt-6 flex justify-end gap-2"><a th:href="@{/admin/categories}" class="rounded border px-4 py-2 text-sm font-semibold">Hủy</a><button class="rounded bg-indigo-600 px-4 py-2 text-sm font-semibold text-white">Lưu</button></div>
</form>
</main></body></html>
