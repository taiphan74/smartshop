<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{admin/fragments/layout :: adminLayout(~{::main})}">
<body>
<main>
    <div class="mb-6 flex items-start justify-between gap-4">
        <div>
            <h1 class="text-2xl font-bold text-slate-900">Quản lý feedback</h1>
            <p class="text-sm text-slate-500">Duyệt, ẩn/hiện và xóa đánh giá sản phẩm.</p>
        </div>
        <form method="get" th:action="@{/admin/reviews}" class="flex items-center gap-2">
            <select name="visible" class="rounded-lg border border-slate-200 bg-white px-3 py-2 text-sm">
                <option value="" th:selected="${selectedVisible == null}">Tất cả</option>
                <option value="true" th:selected="${selectedVisible == true}">Đang hiển thị</option>
                <option value="false" th:selected="${selectedVisible == false}">Đã ẩn</option>
            </select>
            <button class="rounded-lg bg-indigo-600 px-4 py-2 text-sm font-semibold text-white hover:bg-indigo-700" type="submit">Lọc</button>
        </form>
    </div>

    <div th:if="${successMessage}" class="mb-4 rounded-lg border border-emerald-200 bg-emerald-50 px-4 py-3 text-sm text-emerald-700" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="mb-4 rounded-lg border border-rose-200 bg-rose-50 px-4 py-3 text-sm text-rose-700" th:text="${errorMessage}"></div>

    <div class="overflow-hidden rounded-xl border border-slate-200 bg-white shadow-sm">
        <table class="w-full text-left text-sm">
            <thead class="bg-slate-50 text-xs font-semibold uppercase text-slate-400">
            <tr>
                <th class="p-4">Sản phẩm</th>
                <th class="p-4">Người đánh giá</th>
                <th class="p-4">Rating</th>
                <th class="p-4">Bình luận</th>
                <th class="p-4">Trạng thái</th>
                <th class="p-4">Ngày tạo</th>
                <th class="p-4">Thao tác</th>
            </tr>
            </thead>
            <tbody class="divide-y divide-slate-100">
            <tr th:each="review : ${reviews.content}">
                <td class="p-4 font-semibold text-slate-800" th:text="${review.product.name}">Product</td>
                <td class="p-4 text-slate-600" th:text="${review.user.fullName != null ? review.user.fullName : review.user.email}">User</td>
                <td class="p-4 text-amber-600" th:text="${review.rating + ' sao'}">5 sao</td>
                <td class="p-4 text-slate-500" th:text="${#strings.abbreviate(review.comment, 80)}">Comment</td>
                <td class="p-4">
                    <span th:if="${review.visible}" class="rounded bg-emerald-50 px-2 py-1 text-xs font-semibold text-emerald-700">Đang hiện</span>
                    <span th:unless="${review.visible}" class="rounded bg-slate-100 px-2 py-1 text-xs font-semibold text-slate-600">Đã ẩn</span>
                </td>
                <td class="p-4 text-slate-500" th:text="${#temporals.format(review.createdAt, 'dd/MM/yyyy HH:mm')}">date</td>
                <td class="p-4">
                    <a th:href="@{/admin/reviews/{id}(id=${review.id})}" class="rounded bg-slate-800 px-3 py-1.5 text-xs font-semibold text-white hover:bg-slate-700">Chi tiết</a>
                </td>
            </tr>
            <tr th:if="${reviews.empty}">
                <td colspan="7" class="p-4 text-slate-500">Không có feedback phù hợp.</td>
            </tr>
            </tbody>
        </table>
    </div>

    <div class="mt-4 flex items-center justify-between text-sm text-slate-500" th:if="${reviews.totalPages > 1}">
        <a th:if="${reviews.hasPrevious()}" th:href="@{/admin/reviews(page=${reviews.number - 1}, visible=${selectedVisible})}" class="rounded border px-3 py-2">Trước</a>
        <span th:text="${'Trang ' + (reviews.number + 1) + '/' + reviews.totalPages}">Trang</span>
        <a th:if="${reviews.hasNext()}" th:href="@{/admin/reviews(page=${reviews.number + 1}, visible=${selectedVisible})}" class="rounded border px-3 py-2">Sau</a>
    </div>
</main>
</body>
</html>
