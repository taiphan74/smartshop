<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{admin/fragments/layout :: adminLayout(~{::main})}">
<body>
<main>
    <div class="admin-page-header">
        <div>
            <h1 class="admin-page-title">Quản lý feedback</h1>
            <p class="admin-page-subtitle">Duyệt, ẩn/hiện và xóa đánh giá sản phẩm.</p>
        </div>
        <form method="get" th:action="@{/admin/reviews}" class="flex items-center gap-2">
            <select name="visible" class="admin-select">
                <option value="" th:selected="${selectedVisible == null}">Tất cả</option>
                <option value="true" th:selected="${selectedVisible == true}">Đang hiển thị</option>
                <option value="false" th:selected="${selectedVisible == false}">Đã ẩn</option>
            </select>
            <button class="admin-btn-primary" type="submit">Lọc</button>
        </form>
    </div>

    <div th:if="${successMessage}" class="admin-alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="admin-alert-danger" th:text="${errorMessage}"></div>

    <div class="admin-table-wrap">
        <table class="admin-table">
            <thead>
            <tr>
                <th class="p-4">Sản phẩm</th>
                <th class="p-4">Người đánh giá</th>
                <th class="p-4">Rating</th>
                <th class="p-4">Bình luận</th>
                <th class="p-4">Trạng thái</th>
                <th class="p-4">Ngày tạo</th>
                <th class="p-4">Thao tác</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="review : ${reviews.content}">
                <td class="p-4 font-semibold text-slate-800" th:text="${review.product.name}">Product</td>
                <td class="p-4 text-slate-600" th:text="${review.user.fullName != null ? review.user.fullName : review.user.email}">User</td>
                <td class="p-4 text-amber-600 font-semibold" th:text="${review.rating + ' sao'}">5 sao</td>
                <td class="p-4 text-slate-500" th:text="${#strings.abbreviate(review.comment, 80)}">Comment</td>
                <td class="p-4">
                    <span th:if="${review.visible}" class="admin-badge-success">Đang hiện</span>
                    <span th:unless="${review.visible}" class="admin-badge-neutral">Đã ẩn</span>
                </td>
                <td class="p-4 text-slate-500" th:text="${#temporals.format(review.createdAt, 'dd/MM/yyyy HH:mm')}">date</td>
                <td class="p-4">
                    <a th:href="@{/admin/reviews/{id}(id=${review.id})}" class="admin-btn-secondary text-sm">Chi tiết</a>
                </td>
            </tr>
            <tr th:if="${reviews.empty}">
                <td class="p-4 admin-empty" colspan="7">Không có feedback phù hợp.</td>
            </tr>
            </tbody>
        </table>
    </div>

    <div class="mt-4 flex items-center justify-between text-sm text-slate-500" th:if="${reviews.totalPages > 1}">
        <a th:if="${reviews.hasPrevious()}" th:href="@{/admin/reviews(page=${reviews.number - 1}, visible=${selectedVisible})}" class="admin-btn-secondary text-sm">Trước</a>
        <span th:text="${'Trang ' + (reviews.number + 1) + '/' + reviews.totalPages}">Trang</span>
        <a th:if="${reviews.hasNext()}" th:href="@{/admin/reviews(page=${reviews.number + 1}, visible=${selectedVisible})}" class="admin-btn-secondary text-sm">Sau</a>
    </div>
</main>
</body>
</html>
