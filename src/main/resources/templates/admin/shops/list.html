<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{admin/fragments/layout :: adminLayout(~{::main})}">
<body>
<main>
    <div class="mb-6 flex items-start justify-between gap-4">
        <div>
            <h1 class="text-2xl font-bold text-slate-900">Duyệt shop</h1>
            <p class="text-sm text-slate-500">Quản lý trạng thái shop bằng dữ liệu thật và lịch sử duyệt.</p>
        </div>
        <form method="get" th:action="@{/admin/shops}" class="flex items-center gap-2">
            <select name="status" class="rounded-lg border border-slate-200 bg-white px-3 py-2 text-sm">
                <option value="">Tất cả trạng thái</option>
                <option th:each="status : ${statuses}"
                        th:value="${status}"
                        th:selected="${selectedStatus == status}"
                        th:text="${status}">PENDING</option>
            </select>
            <button class="rounded-lg bg-indigo-600 px-4 py-2 text-sm font-semibold text-white hover:bg-indigo-700" type="submit">Lọc</button>
        </form>
    </div>

    <div th:if="${successMessage}" class="mb-4 rounded-lg border border-emerald-200 bg-emerald-50 px-4 py-3 text-sm text-emerald-700" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="mb-4 rounded-lg border border-rose-200 bg-rose-50 px-4 py-3 text-sm text-rose-700" th:text="${errorMessage}"></div>

    <div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
        <table class="w-full text-left border-collapse">
            <thead>
            <tr class="bg-slate-50 text-slate-400 text-xs font-semibold uppercase border-b border-slate-200">
                <th class="p-4">Shop</th>
                <th class="p-4">Chủ shop</th>
                <th class="p-4">Liên hệ</th>
                <th class="p-4">Trạng thái</th>
                <th class="p-4">Ngày tạo</th>
                <th class="p-4">Thao tác</th>
            </tr>
            </thead>
            <tbody class="divide-y divide-slate-100 text-sm">
            <tr th:each="shop : ${shops}">
                <td class="p-4">
                    <p class="font-semibold text-slate-800" th:text="${shop.name}">Shop name</p>
                    <p class="text-xs text-slate-500" th:text="${shop.slug}">slug</p>
                </td>
                <td class="p-4 text-slate-700" th:text="${shop.owner.fullName != null ? shop.owner.fullName : shop.owner.email}">Owner</td>
                <td class="p-4 text-slate-500">
                    <p th:text="${shop.email}">email</p>
                    <p th:text="${shop.phone}">phone</p>
                </td>
                <td class="p-4">
                    <span class="px-2 py-1 text-xs font-semibold rounded bg-slate-50 text-slate-700 border border-slate-200" th:text="${shop.status}">PENDING</span>
                </td>
                <td class="p-4 text-slate-500" th:text="${#temporals.format(shop.createdAt, 'dd/MM/yyyy HH:mm')}">20/05/2026</td>
                <td class="p-4 space-y-2">
                    <form th:action="@{/admin/shops/{id}/approve(id=${shop.id})}" method="post" th:if="${shop.status.name() != 'APPROVED'}">
                        <button type="submit" class="rounded bg-emerald-600 px-3 py-1.5 text-xs font-semibold text-white hover:bg-emerald-700">Duyệt</button>
                    </form>
                    <form th:action="@{/admin/shops/{id}/reject(id=${shop.id})}" method="post" th:if="${shop.status.name() != 'REJECTED'}" class="flex gap-2">
                        <input name="reason" required placeholder="Lý do từ chối" class="w-40 rounded border border-slate-200 px-2 py-1 text-xs">
                        <button type="submit" class="rounded bg-rose-600 px-3 py-1.5 text-xs font-semibold text-white hover:bg-rose-700">Từ chối</button>
                    </form>
                    <form th:action="@{/admin/shops/{id}/suspend(id=${shop.id})}" method="post" th:if="${shop.status.name() == 'APPROVED'}" class="flex gap-2">
                        <input name="reason" required placeholder="Lý do tạm ngưng" class="w-40 rounded border border-slate-200 px-2 py-1 text-xs">
                        <button type="submit" class="rounded bg-amber-600 px-3 py-1.5 text-xs font-semibold text-white hover:bg-amber-700">Tạm ngưng</button>
                    </form>
                </td>
            </tr>
            <tr th:if="${shops.isEmpty()}">
                <td class="p-4 text-slate-500" colspan="6">Không có shop phù hợp.</td>
            </tr>
            </tbody>
        </table>
    </div>
</main>
</body>
</html>
