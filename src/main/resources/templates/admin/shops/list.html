<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{admin/fragments/layout :: adminLayout(~{::main})}">
<body>
<main>
    <div class="admin-page-header">
        <div>
            <h1 class="admin-page-title">Duyệt shop</h1>
            <p class="admin-page-subtitle">Quản lý trạng thái shop bằng dữ liệu thật và lịch sử duyệt.</p>
        </div>
        <form method="get" th:action="@{/admin/shops}" class="flex items-center gap-2">
            <select name="status" class="admin-select">
                <option value="">Tất cả trạng thái</option>
                <option th:each="status : ${statuses}"
                        th:value="${status}"
                        th:selected="${selectedStatus == status}"
                        th:text="${status}">PENDING</option>
            </select>
            <button class="admin-btn-primary" type="submit">Lọc</button>
        </form>
    </div>

    <div th:if="${successMessage}" class="admin-alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="admin-alert-danger" th:text="${errorMessage}"></div>

    <div class="admin-table-wrap">
        <table class="admin-table">
            <thead>
            <tr>
                <th class="p-4">Shop</th>
                <th class="p-4">Chủ shop</th>
                <th class="p-4">Liên hệ</th>
                <th class="p-4">Trạng thái</th>
                <th class="p-4">Ngày tạo</th>
                <th class="p-4">Thao tác</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="shop : ${shops}">
                <td class="p-4">
                    <a class="font-semibold text-indigo-700 hover:text-indigo-900" th:href="@{/admin/shops/{id}(id=${shop.id})}" th:text="${shop.name}">Shop name</a>
                    <p class="text-xs text-slate-500 mt-1" th:text="${shop.slug}">slug</p>
                </td>
                <td class="p-4 text-slate-700" th:text="${shop.owner.fullName != null ? shop.owner.fullName : shop.owner.email}">Owner</td>
                <td class="p-4 text-slate-500">
                    <p th:text="${shop.email}">email</p>
                    <p th:text="${shop.phone}">phone</p>
                </td>
                <td class="p-4">
                    <span th:switch="${shop.status}">
                        <span th:case="'APPROVED'" class="admin-badge-success" th:text="${shop.status}">APPROVED</span>
                        <span th:case="'PENDING'" class="admin-badge-info" th:text="${shop.status}">PENDING</span>
                        <span th:case="'REJECTED'" class="admin-badge-danger" th:text="${shop.status}">REJECTED</span>
                        <span th:case="'SUSPENDED'" class="admin-badge-warning" th:text="${shop.status}">SUSPENDED</span>
                        <span th:case="*" class="admin-badge-neutral" th:text="${shop.status}">UNKNOWN</span>
                    </span>
                </td>
                <td class="p-4 text-slate-500" th:text="${#temporals.format(shop.createdAt, 'dd/MM/yyyy HH:mm')}">20/05/2026</td>
                <td class="p-4 space-y-2">
                    <form th:action="@{/admin/shops/{id}/approve(id=${shop.id})}" method="post" th:if="${shop.status.name() != 'APPROVED'}">
                        <button type="submit" class="admin-btn-success text-sm w-full">Duyệt</button>
                    </form>
                    <form th:action="@{/admin/shops/{id}/reject(id=${shop.id})}" method="post" th:if="${shop.status.name() != 'REJECTED'}" class="flex gap-2">
                        <input name="reason" required placeholder="Lý do từ chối" class="admin-input text-xs w-40">
                        <button type="submit" class="admin-btn-danger text-sm">Từ chối</button>
                    </form>
                    <form th:action="@{/admin/shops/{id}/suspend(id=${shop.id})}" method="post" th:if="${shop.status.name() == 'APPROVED'}" class="flex gap-2">
                        <input name="reason" required placeholder="Lý do tạm ngưng" class="admin-input text-xs w-40">
                        <button type="submit" class="admin-btn-warning text-sm">Tạm ngưng</button>
                    </form>
                </td>
            </tr>
            <tr th:if="${shops.isEmpty()}">
                <td class="p-4 admin-empty" colspan="6">Không có shop phù hợp.</td>
            </tr>
            </tbody>
        </table>
    </div>
</main>
</body>
</html>
