<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{admin/fragments/layout :: adminLayout(~{::main})}">
<body>
<main>
    <div class="mb-6">
        <a th:href="@{/admin/shops/{id}(id=${shop.id})}" class="text-sm font-semibold text-indigo-600 hover:text-indigo-700">← Quay lại chi tiết</a>
        <h1 class="mt-2 text-2xl font-bold text-slate-900">Sửa shop</h1>
    </div>

    <form th:action="@{/admin/shops/{id}/edit(id=${shop.id})}" th:object="${form}" method="post" class="max-w-3xl rounded-xl border border-slate-200 bg-white p-6 shadow-sm">
        <div th:if="${#fields.hasGlobalErrors()}" class="mb-4 rounded border border-rose-200 bg-rose-50 px-4 py-3 text-sm text-rose-700" th:each="err : ${#fields.globalErrors()}" th:text="${err}"></div>
        <div class="grid gap-4 md:grid-cols-2">
            <label class="block text-sm font-semibold text-slate-700">Tên shop
                <input th:field="*{name}" class="mt-1 w-full rounded border border-slate-200 px-3 py-2">
                <span th:errors="*{name}" class="text-xs text-rose-600"></span>
            </label>
            <label class="block text-sm font-semibold text-slate-700">Slug
                <input th:field="*{slug}" class="mt-1 w-full rounded border border-slate-200 px-3 py-2">
                <span th:errors="*{slug}" class="text-xs text-rose-600"></span>
            </label>
            <label class="block text-sm font-semibold text-slate-700">Email
                <input th:field="*{email}" class="mt-1 w-full rounded border border-slate-200 px-3 py-2">
                <span th:errors="*{email}" class="text-xs text-rose-600"></span>
            </label>
            <label class="block text-sm font-semibold text-slate-700">SĐT
                <input th:field="*{phone}" class="mt-1 w-full rounded border border-slate-200 px-3 py-2">
            </label>
            <label class="block text-sm font-semibold text-slate-700">Logo URL
                <input th:field="*{logoUrl}" class="mt-1 w-full rounded border border-slate-200 px-3 py-2">
            </label>
            <label class="block text-sm font-semibold text-slate-700">Banner URL
                <input th:field="*{bannerUrl}" class="mt-1 w-full rounded border border-slate-200 px-3 py-2">
            </label>
            <label class="block text-sm font-semibold text-slate-700">Trạng thái
                <select th:field="*{status}" class="mt-1 w-full rounded border border-slate-200 px-3 py-2">
                    <option th:each="status : ${statuses}" th:value="${status}" th:text="${status}">PENDING</option>
                </select>
            </label>
            <label class="block text-sm font-semibold text-slate-700 md:col-span-2">Mô tả
                <textarea th:field="*{description}" rows="5" class="mt-1 w-full rounded border border-slate-200 px-3 py-2"></textarea>
            </label>
        </div>
        <div class="mt-6 flex justify-end gap-2">
            <a th:href="@{/admin/shops/{id}(id=${shop.id})}" class="rounded border border-slate-200 px-4 py-2 text-sm font-semibold text-slate-700">Hủy</a>
            <button type="submit" class="rounded bg-indigo-600 px-4 py-2 text-sm font-semibold text-white hover:bg-indigo-700">Lưu</button>
        </div>
    </form>
</main>
</body>
</html>
