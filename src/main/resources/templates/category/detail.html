<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head(#{category.detail.page_title})}"></head>

<body class="bg-page-bg text-text-primary font-sans antialiased">
    <div th:replace="~{fragments/header :: header}"></div>
    <main class="container mx-auto px-4 py-8">
        <h1 class="text-2xl font-semibold mb-4 text-text-primary" th:text="#{category.detail.title}">Chi tiết danh mục</h1>
        <div class="bg-surface rounded-lg shadow-sm border border-border p-6 mb-6">
            <h2 class="text-xl text-text-primary font-medium mb-2" th:text="#{category.detail.info}">Thông tin danh mục</h2>
            <p class="text-text-secondary"><span th:text="#{category.detail.name}">Tên danh mục:</span> <span class="text-text-primary font-medium" th:text="#{category.detail.sample_name}">Tên mẫu</span></p>
        </div>
        <h2 class="text-xl font-semibold mb-4 text-text-primary" th:text="#{category.detail.products}">Sản phẩm trong danh mục</h2>
        <div class="bg-surface rounded-lg shadow-sm border border-border p-6">
            <p class="text-text-secondary" th:text="#{category.detail.empty}">Chưa có sản phẩm nào để hiển thị.</p>
        </div>
    </main>
    <div th:replace="~{fragments/footer :: footer}"></div>
</body>

</html>
