<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head(#{profile.page_title})}"></head>
<body class="profile-page">

    <!-- Header chung -->
    <div th:replace="~{fragments/header :: header}"></div>

    <!-- Nội dung chính -->
    <main class="max-w-[1280px] mx-auto px-4 md:px-6 py-6">
        
        <!-- Alert message -->
        <div class="mb-4 bg-green-50 text-green-700 p-3 rounded-lg text-sm font-medium border border-green-100 shadow-sm"
             th:if="${successMessage}" th:text="${successMessage}"></div>
             
        <div class="mb-4 bg-red-50 text-red-700 p-3 rounded-lg text-sm font-medium border border-red-100 shadow-sm"
             th:if="${errorMessage}" th:text="${errorMessage}"></div>

        <!-- Khối Avatar & Quick Info -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 mb-6 flex flex-col sm:flex-row items-center gap-6">
            <!-- Avatar Fallback: Chữ cái đầu nếu không có avatarUrl -->
            <div class="w-20 h-20 rounded-full bg-brand-blue/10 text-brand-blue flex items-center justify-center text-3xl font-bold border-2 border-gray-100 shadow-sm shrink-0">
                <span th:text="${user.fullName != null and !user.fullName.isEmpty()} ? ${user.fullName.charAt(0)} : 'U'">A</span>
            </div>
            
            <div class="flex-1 text-center sm:text-left">
                <h2 class="text-xl font-bold text-gray-900" th:text="${user.fullName}">Full Name</h2>
                <p class="text-sm text-gray-500" th:text="${user.email}">email@example.com</p>
            </div>

            <!-- Nút Edit (Chỉ hiện khi không ở Edit Mode) -->
            <div th:if="${!isEdit}">
                <a th:href="@{/profile(edit=true)}" class="bg-brand-blue text-white px-5 py-2.5 rounded-lg text-sm font-bold hover:shadow-md transition-all duration-300 inline-block" th:text="#{profile.edit}">Edit</a>
            </div>
        </div>

        <!-- Form Thông tin Chi tiết -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
            <div class="p-4 md:p-6 border-b border-gray-50">
                <h3 class="text-lg font-bold text-gray-900 flex items-center gap-2">
                    <span class="text-brand-red">👤</span> <span th:text="#{profile.personal_info}">Thông tin cá nhân</span>
                </h3>
            </div>

            <div class="p-4 md:p-6 bg-gray-50/30">
                
                <!-- VIEW MODE -->
                <div th:if="${!isEdit}" class="space-y-6">
                    <div>
                        <label class="text-sm font-medium text-gray-500" th:text="#{profile.full_name}">Họ và tên</label>
                        <p class="text-base text-gray-900 mt-1" th:text="${user.fullName}">Nguyễn Văn A</p>
                    </div>
                    <div>
                        <label class="text-sm font-medium text-gray-500" th:text="#{profile.phone}">Số điện thoại</label>
                        <p th:if="${user.phone != null and !user.phone.isBlank()}" class="text-base text-gray-900 mt-1" th:text="${user.phone}">0987654321</p>
                        <p th:unless="${user.phone != null and !user.phone.isBlank()}" class="text-base text-gray-400 italic mt-1" th:text="#{profile.not_updated}">Chưa cập nhật</p>
                    </div>
                    <div>
                        <label class="text-sm font-medium text-gray-500" th:text="#{profile.username}">Tên đăng nhập</label>
                        <p class="text-base text-gray-900 mt-1" th:text="${user.username}">username</p>
                    </div>
                    <div>
                        <label class="text-sm font-medium text-gray-500" th:text="#{profile.email}">Email</label>
                        <p class="text-base text-gray-900 mt-1" th:text="${user.email}">email@example.com</p>
                    </div>
                </div>

                <!-- EDIT MODE -->
                <form th:if="${isEdit}" th:action="@{/profile}" th:object="${profileForm}" method="post" class="space-y-6">
                    <!-- FullName Field -->
                    <div>
                        <label class="text-sm font-medium text-gray-500" th:text="#{profile.full_name}">Họ tên</label><span class="text-red-500 ml-1">*</span>
                        <input type="text" th:field="*{fullName}" class="w-full border border-gray-200 rounded-lg px-4 py-2 mt-1 focus:ring-2 focus:ring-brand-blue focus:border-brand-blue outline-none transition" />
                        <p th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}" class="text-red-500 text-xs mt-1"></p>
                    </div>
                    
                    <!-- Phone Field -->
                    <div>
                        <label class="text-sm font-medium text-gray-500" th:text="#{profile.phone}">Số điện thoại</label>
                        <input type="text" th:field="*{phone}" placeholder="VD: 0912345678" class="w-full border border-gray-200 rounded-lg px-4 py-2 mt-1 focus:ring-2 focus:ring-brand-blue focus:border-brand-blue outline-none transition" />
                        <p th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}" class="text-red-500 text-xs mt-1"></p>
                    </div>
                    
                    <div>
                        <label class="text-sm font-medium text-gray-500" th:text="#{profile.username}">Tên đăng nhập</label>
                        <p class="text-base text-gray-900 mt-1" th:text="${user.username}">username</p>
                        <span class="text-xs text-gray-400" th:text="#{profile.cannot_change}">Không thể thay đổi</span>
                    </div>
                    <div>
                        <label class="text-sm font-medium text-gray-500" th:text="#{profile.email}">Email</label>
                        <p class="text-base text-gray-900 mt-1" th:text="${user.email}">email@example.com</p>
                        <span class="text-xs text-gray-400" th:text="#{profile.cannot_change}">Không thể thay đổi</span>
                    </div>

                    <!-- Action Buttons -->
                    <div class="flex gap-3 pt-4 border-t border-gray-100">
                        <button type="submit" class="bg-brand-blue text-white px-6 py-2.5 rounded-lg font-bold hover:shadow-md transition-all duration-300" th:text="#{profile.save}">Save</button>
                        <a th:href="@{/profile}" class="bg-gray-100 text-gray-700 px-6 py-2.5 rounded-lg font-bold hover:bg-gray-200 transition-all duration-300 inline-block" th:text="#{profile.cancel}">Cancel</a>
                    </div>
                </form>

            </div>
        </div>

    </main>
</body>
</html>
