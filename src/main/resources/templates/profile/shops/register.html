<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <div th:replace="~{fragments/head}" th:remove="tag"></div>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'brand-blue': '#1e40af'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50/50 min-h-screen flex flex-col justify-between">

    <div>
        <div th:replace="~{fragments/header}"></div>

        <div class="max-w-2xl mx-auto px-4 py-10">
            
            <div class="mb-6">
                <a th:href="@{/profile}" class="text-sm font-medium text-gray-500 hover:text-brand-blue transition-all duration-300 flex items-center gap-1">
                    ⬅ <span th:text="#{profile.cancel}">Hủy bỏ</span>
                </a>
            </div>

            <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                
                <div class="p-4 md:p-6 border-b border-gray-50 bg-white">
                    <h3 class="text-lg font-bold text-gray-900 flex items-center gap-2">
                        🏪 <span th:text="#{shop.register_title}">Đăng ký mở cửa hàng mới</span>
                    </h3>
                    <p class="text-xs text-gray-400 mt-1">Trở thành người bán hàng trên hệ thống SmartShop. Cửa hàng sẽ hoạt động ngay sau khi được ban quản trị phê duyệt.</p>
                </div>

                <div class="p-4 md:p-6 bg-gray-50/30">
                    <form th:action="@{/profile/shops}" th:object="${shopForm}" method="post" class="space-y-6">
                        
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">
                                <span th:text="#{shop.name_label}">Tên cửa hàng</span> <span class="text-red-500">*</span>
                            </label>
                            <input type="text" th:field="*{name}" required max="150" 
                                   class="w-full px-4 py-2.5 rounded-lg border text-sm font-normal text-gray-900 bg-white focus:outline-none transition-all duration-200"
                                   th:classappend="${#fields.hasErrors('name')} ? 'border-red-500 focus:border-red-500 focus:ring-2 focus:ring-red-500/20' : 'border-gray-200 focus:border-brand-blue focus:ring-2 focus:ring-brand-blue/20'" 
                                   placeholder="Ví dụ: Cửa hàng Công Nghệ ABC">
                            <p th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="text-red-500 text-xs mt-1.5 font-medium"></p>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-2" th:text="#{shop.phone_label}">Số điện thoại cửa hàng</label>
                                <input type="tel" th:field="*{phone}" max="20" 
                                       class="w-full px-4 py-2.5 rounded-lg border text-sm font-normal text-gray-900 bg-white focus:outline-none transition-all duration-200"
                                       th:classappend="${#fields.hasErrors('phone')} ? 'border-red-500 focus:border-red-500 focus:ring-2 focus:ring-red-500/20' : 'border-gray-200 focus:border-brand-blue focus:ring-2 focus:ring-brand-blue/20'" 
                                       placeholder="Ví dụ: 0987654321">
                                <p th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}" class="text-red-500 text-xs mt-1.5 font-medium"></p>
                            </div>

                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-2" th:text="#{shop.address_label}">Địa chỉ cửa hàng</label>
                                <input type="text" th:field="*{address}" max="255" 
                                       class="w-full px-4 py-2.5 rounded-lg border text-sm font-normal text-gray-900 bg-white focus:outline-none transition-all duration-200"
                                       th:classappend="${#fields.hasErrors('address')} ? 'border-red-500 focus:border-red-500 focus:ring-2 focus:ring-red-500/20' : 'border-gray-200 focus:border-brand-blue focus:ring-2 focus:ring-brand-blue/20'" 
                                       placeholder="Số nhà, Tên đường, Quận/Huyện...">
                                <p th:if="${#fields.hasErrors('address')}" th:errors="*{address}" class="text-red-500 text-xs mt-1.5 font-medium"></p>
                            </div>
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2" th:text="#{shop.desc_label}">Mô tả cửa hàng</label>
                            <textarea th:field="*{description}" rows="4" max="1000" 
                                      class="w-full px-4 py-2.5 rounded-lg border text-sm font-normal text-gray-900 bg-white focus:outline-none transition-all duration-200"
                                      th:classappend="${#fields.hasErrors('description')} ? 'border-red-500 focus:border-red-500 focus:ring-2 focus:ring-red-500/20' : 'border-gray-200 focus:border-brand-blue focus:ring-2 focus:ring-brand-blue/20'" 
                                      placeholder="Nhập thông tin giới thiệu ngắn gọn về shop của bạn..."></textarea>
                            <p th:if="${#fields.hasErrors('description')}" th:errors="*{description}" class="text-red-500 text-xs mt-1.5 font-medium"></p>
                        </div>

                        <div class="flex items-center justify-center gap-4 pt-4 border-t border-gray-100">
                            <a th:href="@{/profile}" class="bg-gray-100 text-gray-700 px-6 py-2.5 rounded-lg text-sm font-bold hover:bg-gray-200 transition-all duration-300 inline-block" th:text="#{profile.cancel}">Hủy bỏ</a>
                            <button type="submit" class="bg-brand-blue text-white px-6 py-2.5 rounded-lg text-sm font-bold hover:shadow-lg hover:bg-blue-800 transition-all duration-300" th:text="#{shop.submit_btn}">Xác nhận đăng ký mở Shop</button>
                        </div>

                    </form>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments/footer}"></div>

</body>
</html>
