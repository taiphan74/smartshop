<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head(#{product.list.page_title})}"></head>
<body class="bg-page-bg text-text-primary font-sans antialiased">
    <div th:replace="~{fragments/header :: header}"></div>
    <main class="container mx-auto px-4 py-8">
        <h1 class="text-2xl font-semibold mb-4 text-text-primary" th:text="#{product.list.title}">Danh sách sản phẩm</h1>
        <div class="bg-surface rounded-lg shadow-sm border border-border p-6">
            <!-- Product list placeholder -->
            <p class="text-text-secondary" th:text="#{product.list.empty}">Chưa có sản phẩm nào để hiển thị.</p>
        </div>
    </main>
    <div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
