<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head(${activeCategory != null ? activeCategory.displayName : #messages.msg('product.list.page_title')})}"></head>
<body class="bg-page-bg text-text-primary font-sans antialiased">
    <div th:replace="~{fragments/header :: header}"></div>

    <main class="container mx-auto px-4 py-8">
        <section class="mb-6">
            <h1 class="mt-1 text-2xl md:text-3xl font-bold text-text-primary"
                th:text="${activeCategory != null ? activeCategory.displayName : 'Danh sách sản phẩm'}">Danh sách sản phẩm</h1>
            <p class="mt-2 text-text-secondary"
               th:if="${activeCategory != null}"
               th:text="'Sản phẩm thuộc danh mục ' + ${activeCategory.displayName}">Sản phẩm thuộc danh mục này.</p>
        </section>

        <section class="mb-6"
                 th:if="${activeCategory != null and childCategories != null and !#lists.isEmpty(childCategories)}">
            <div class="flex flex-wrap gap-2">
                <a th:each="cat : ${childCategories}"
                   th:href="@{/products(category=${cat.slug})}"
                   class="rounded-full border border-border bg-surface px-4 py-2 text-sm font-medium text-text-primary hover:border-brand-blue hover:text-brand-blue transition-colors"
                   th:text="${cat.displayName}">Danh mục con</a>
            </div>
        </section>

        <section th:if="${products != null and !products.isEmpty()}">
            <div th:replace="~{fragments/product-grid :: grid(products=${products})}"></div>
        </section>

        <section class="empty-state" th:if="${products == null or products.isEmpty()}">
                <p th:if="${activeCategory != null}" th:text="#{product.list.category_empty}">
                    Chưa có sản phẩm nào trong danh mục này.
                </p>
                <p th:if="${activeCategory == null}" th:text="#{product.list.empty}">
                    Chưa có sản phẩm nào để hiển thị.
                </p>
            </div>
        </section>
    </main>

    <div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
