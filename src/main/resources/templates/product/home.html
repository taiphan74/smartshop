<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartShop - Trang chủ</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #f5f5f5; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        h1 { text-align: center; color: #333; margin: 30px 0; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .product-card { background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); transition: transform 0.2s; }
        .product-card:hover { transform: translateY(-4px); box-shadow: 0 4px 16px rgba(0,0,0,0.15); }
        .product-card img { width: 100%; height: 200px; object-fit: cover; }
        .product-info { padding: 15px; }
        .product-name { font-size: 16px; font-weight: bold; color: #333; margin-bottom: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .product-category { font-size: 13px; color: #888; margin-bottom: 10px; }
        .product-price { font-size: 18px; color: #e74c3c; font-weight: bold; }
        .product-link { text-decoration: none; color: inherit; }
        .empty-message { text-align: center; color: #666; padding: 40px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛍️ SmartShop - Danh sách sản phẩm</h1>
        
        <div class="product-grid" th:if="${products != null and !products.isEmpty()}">
            <a th:each="product : ${products}" 
               th:href="@{/san-pham/{slug}(slug=${product.slug})}" 
               class="product-link">
                <div class="product-card">
                    <img th:src="${product.thumbnailUrl}" th:alt="${product.name}" onerror="this.src='https://via.placeholder.com/300'">
                    <div class="product-info">
                        <div class="product-name" th:text="${product.name}">Tên sản phẩm</div>
                        <div class="product-category" th:text="${product.categoryName}">Danh mục</div>
                        <div class="product-price">
                            <span th:text="${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT')} + '₫'">0₫</span>
                        </div>
                    </div>
                </div>
            </a>
        </div>
        
        <div class="empty-message" th:if="${products == null or products.isEmpty()}">
            <p>Chưa có sản phẩm nào.</p>
        </div>
    </div>
</body>
</html>
