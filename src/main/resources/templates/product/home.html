<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head th:replace="~{fragments/head :: head('SmartShop - Sản phẩm')}"></head>
<body>
    <div th:replace="~{fragments/header :: header}"></div>

    <main class="site-shell page-main">
        <section class="product-section">
            <p class="eyebrow">SmartShop</p>
            <h1 class="section-title">Danh sách sản phẩm</h1>

            <div class="product-grid" th:if="${products != null and !products.isEmpty()}">
                <a th:each="product : ${products}"
                   th:href="@{/products/{slug}(slug=${product.slug})}"
                   class="product-link">
                    <article class="product-card">
                        <img th:src="${product.thumbnailUrl}"
                             th:alt="${product.name}"
                             onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22300%22 height=%22300%22 viewBox=%220 0 300 300%22%3E%3Crect width=%22300%22 height=%22300%22 fill=%22%23f1f5f9%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 dominant-baseline=%22middle%22 text-anchor=%22middle%22 fill=%22%2394a3b8%22 font-family=%22Arial%22 font-size=%2218%22%3ESmartShop%3C/text%3E%3C/svg%3E'">
                        <div class="product-info">
                            <h2 class="product-name" th:text="${product.name}">Tên sản phẩm</h2>
                            <p class="product-category" th:text="${product.categoryName}">Danh mục</p>
                            <p class="product-price"
                               th:text="${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT')} + '₫'">0₫</p>
                        </div>
                    </article>
                </a>
            </div>

            <div class="empty-state" th:if="${products == null or products.isEmpty()}">
                <p>Chưa có sản phẩm nào.</p>
            </div>
        </section>
    </main>

    <div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
