<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{seller/layout/seller-layout :: main-layout(~{::div})}">
<body>
<div class="max-w-[1280px] mx-auto px-4 md:px-6 py-6">
    <!-- Flash Messages -->
    <div th:if="${successMessage}" class="mb-4 p-4 bg-green-50 border border-green-200 rounded-xl text-green-700 text-sm">
        <span th:text="${successMessage}"></span>
    </div>
    <div th:if="${errorMessage}" class="mb-4 p-4 bg-red-50 border border-red-200 rounded-xl text-red-700 text-sm">
        <span th:text="${errorMessage}"></span>
    </div>

    <!-- Header -->
    <div class="flex items-center justify-between mb-6">
        <div>
            <h2 class="text-lg md:text-xl font-bold text-gray-900">Quản lý sản phẩm</h2>
            <p class="mt-1 text-sm text-gray-500">Thêm, sửa, xóa sản phẩm của shop</p>
        </div>
        <a th:href="@{/seller/products/new(shopId=${shopId})}"
           class="inline-flex items-center gap-2 px-4 py-2.5 bg-brand-blue text-white text-sm font-medium rounded-xl hover:bg-brand-blue/90 transition-colors">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
            Thêm sản phẩm
        </a>
    </div>

    <!-- Product Table -->
    <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
        <div class="overflow-x-auto">
            <table class="w-full text-sm">
                <thead class="bg-gray-50 border-b border-gray-100">
                    <tr>
                        <th class="text-left px-4 py-3 font-medium text-gray-500 uppercase tracking-wider">Ảnh</th>
                        <th class="text-left px-4 py-3 font-medium text-gray-500 uppercase tracking-wider">Tên sản phẩm</th>
                        <th class="text-left px-4 py-3 font-medium text-gray-500 uppercase tracking-wider">Danh mục</th>
                        <th class="text-right px-4 py-3 font-medium text-gray-500 uppercase tracking-wider">Giá</th>
                        <th class="text-center px-4 py-3 font-medium text-gray-500 uppercase tracking-wider">Trạng thái</th>
                        <th class="text-center px-4 py-3 font-medium text-gray-500 uppercase tracking-wider">Hành động</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-gray-50">
                    <tr th:each="p : ${products}" class="hover:bg-gray-50/50 transition-colors">
                        <td class="px-4 py-3">
                            <img th:src="${p.thumbnailUrl != null ? p.thumbnailUrl : 'https://via.placeholder.com/48'}"
                                 alt="" class="w-12 h-12 rounded-lg object-cover border border-gray-100">
                        </td>
                        <td class="px-4 py-3">
                            <a th:href="@{/seller/products/{id}/edit(id=${p.id}, shopId=${shopId})}"
                               class="font-medium text-gray-900 hover:text-brand-blue transition-colors"
                               th:text="${p.name}">Tên SP</a>
                        </td>
                        <td class="px-4 py-3 text-gray-500" th:text="${p.categoryName}">Danh mục</td>
                        <td class="px-4 py-3 text-right font-medium text-gray-900"
                            th:text="${p.price != null ? #numbers.formatDecimal(p.price, 0, 'COMMA', 0, 'POINT') + ' đ' : '0 đ'}">0 đ</td>
                        <td class="px-4 py-3 text-center">
                            <span th:if="${p.status}" class="inline-flex px-2.5 py-0.5 rounded-full text-xs font-medium bg-green-50 text-green-700">Đang bán</span>
                            <span th:unless="${p.status}" class="inline-flex px-2.5 py-0.5 rounded-full text-xs font-medium bg-red-50 text-red-700">Ngưng bán</span>
                        </td>
                        <td class="px-4 py-3 text-center">
                            <div class="flex items-center justify-center gap-2">
                                <a th:href="@{/seller/products/{id}/edit(id=${p.id}, shopId=${shopId})}"
                                   class="p-1.5 text-gray-400 hover:text-brand-blue hover:bg-brand-blue-soft rounded-lg transition-colors" title="Sửa">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
                                </a>
                                <form th:action="@{/seller/products/{id}/delete(id=${p.id})}" method="post" class="inline"
                                      onsubmit="return confirm('Bạn có chắc muốn xóa sản phẩm này?');">
                                    <input type="hidden" name="shopId" th:value="${shopId}">
                                    <button type="submit" class="p-1.5 text-gray-400 hover:text-red-600 hover:bg-red-50 rounded-lg transition-colors" title="Xóa">
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                                    </button>
                                </form>
                            </div>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(products)}">
                        <td colspan="6" class="px-4 py-12 text-center text-gray-400">
                            Chưa có sản phẩm nào. <a th:href="@{/seller/products/new(shopId=${shopId})}" class="text-brand-blue hover:underline">Thêm sản phẩm mới</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Pagination -->
    <div th:if="${pageResponse != null and pageResponse.totalPages > 1}" class="flex items-center justify-center gap-1 mt-6">
        <a th:href="@{/seller/products(shopId=${shopId}, page=0, size=${pageResponse.pageSize}, sort=${currentSort}, direction=${currentDirection})}"
           th:classappend="${pageResponse.pageNo == 0} ? 'pointer-events-none opacity-40'"
           class="px-3 py-2 text-sm rounded-lg border border-gray-200 text-gray-600 hover:bg-gray-50">&laquo;</a>
        <a th:href="@{/seller/products(shopId=${shopId}, page=${pageResponse.pageNo - 1}, size=${pageResponse.pageSize}, sort=${currentSort}, direction=${currentDirection})}"
           th:classappend="${pageResponse.pageNo == 0} ? 'pointer-events-none opacity-40'"
           class="px-3 py-2 text-sm rounded-lg border border-gray-200 text-gray-600 hover:bg-gray-50">&lsaquo;</a>
        <th:block th:each="i : ${#numbers.sequence(0, pageResponse.totalPages - 1)}">
            <a th:if="${i >= pageResponse.pageNo - 2 and i <= pageResponse.pageNo + 2}"
               th:href="@{/seller/products(shopId=${shopId}, page=${i}, size=${pageResponse.pageSize}, sort=${currentSort}, direction=${currentDirection})}"
               th:text="${i + 1}"
               th:classappend="${i == pageResponse.pageNo} ? 'bg-brand-blue text-white border-brand-blue'"
               class="px-3 py-2 text-sm rounded-lg border border-gray-200 text-gray-600 hover:bg-gray-50"></a>
        </th:block>
        <a th:href="@{/seller/products(shopId=${shopId}, page=${pageResponse.pageNo + 1}, size=${pageResponse.pageSize}, sort=${currentSort}, direction=${currentDirection})}"
           th:classappend="${pageResponse.last} ? 'pointer-events-none opacity-40'"
           class="px-3 py-2 text-sm rounded-lg border border-gray-200 text-gray-600 hover:bg-gray-50">&rsaquo;</a>
        <a th:href="@{/seller/products(shopId=${shopId}, page=${pageResponse.totalPages - 1}, size=${pageResponse.pageSize}, sort=${currentSort}, direction=${currentDirection})}"
           th:classappend="${pageResponse.last} ? 'pointer-events-none opacity-40'"
           class="px-3 py-2 text-sm rounded-lg border border-gray-200 text-gray-600 hover:bg-gray-50">&raquo;</a>
    </div>
</div>
</body>
</html>
