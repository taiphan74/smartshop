<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{seller/layout/seller-layout :: main-layout(~{::div})}">
<body>
<div class="max-w-3xl mx-auto px-4 md:px-6 py-6">
    <!-- Header -->
    <div class="mb-6">
        <h2 class="text-lg md:text-xl font-bold text-gray-900" th:text="${product != null} ? 'Chỉnh sửa sản phẩm' : 'Thêm sản phẩm mới'">Thêm sản phẩm mới</h2>
        <p class="mt-1 text-sm text-gray-500" th:text="${product != null} ? 'Cập nhật thông tin sản phẩm' : 'Điền thông tin để đăng bán sản phẩm mới'">Điền thông tin</p>
    </div>

    <!-- Form -->
    <form th:action="${product != null} ? '/seller/products/' + ${product.id} : '/seller/products'"
          method="post" class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 space-y-5">
        <input type="hidden" name="shopId" th:value="${shopId}">

        <!-- Image Upload Area -->
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1.5">Hình ảnh sản phẩm</label>
            <div id="image-upload-area" class="flex flex-wrap gap-3">
                <!-- Preview container -->
                <div id="image-previews" class="flex flex-wrap gap-3"></div>
                <!-- Add button -->
                <div id="add-image-btn"
                     class="w-24 h-24 rounded-xl border-2 border-dashed border-gray-300 flex flex-col items-center justify-center cursor-pointer hover:border-brand-blue hover:bg-brand-blue-soft/30 transition-colors"
                     onclick="document.getElementById('image-input').click()">
                    <svg class="w-8 h-8 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                    <span class="text-xs text-gray-400 mt-1">Thêm ảnh</span>
                </div>
            </div>
            <input type="file" id="image-input" accept="image/*" multiple class="hidden" onchange="handleImageUpload(this)">
            <p class="mt-1.5 text-xs text-gray-400">Nhấn để chọn ảnh. Ảnh đầu tiên sẽ là ảnh chính.</p>
        </div>

        <!-- Hidden inputs for image URLs -->
        <div id="hidden-image-inputs"></div>

        <!-- Name -->
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1.5">Tên sản phẩm <span class="text-red-500">*</span></label>
            <input type="text" name="name" th:value="${productRequest.name}"
                   class="w-full px-4 py-2.5 rounded-xl border border-gray-200 focus:border-brand-blue focus:ring-1 focus:ring-brand-blue/20 outline-none transition-colors text-sm"
                   placeholder="Nhập tên sản phẩm" required>
        </div>

        <!-- Category -->
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1.5">Danh mục <span class="text-red-500">*</span></label>
            <select name="categoryId" required
                    class="w-full px-4 py-2.5 rounded-xl border border-gray-200 focus:border-brand-blue focus:ring-1 focus:ring-brand-blue/20 outline-none transition-colors text-sm">
                <option value="" disabled>Chọn danh mục</option>
                <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.displayName}"
                        th:selected="${productRequest.categoryId != null && productRequest.categoryId == cat.id}"></option>
            </select>
        </div>

        <!-- Description -->
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1.5">Mô tả</label>
            <textarea name="description" rows="4"
                      class="w-full px-4 py-2.5 rounded-xl border border-gray-200 focus:border-brand-blue focus:ring-1 focus:ring-brand-blue/20 outline-none transition-colors text-sm resize-y"
                      th:text="${productRequest.description}" placeholder="Mô tả chi tiết sản phẩm"></textarea>
        </div>

        <!-- Status -->
        <div class="flex items-center gap-3">
            <label class="relative inline-flex items-center cursor-pointer">
                <input type="checkbox" name="status" value="true"
                       th:checked="${productRequest.status == null || productRequest.status == true}"
                       class="sr-only peer">
                <div class="w-11 h-6 bg-gray-200 peer-focus:outline-none peer-focus:ring-2 peer-focus:ring-brand-blue/20 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-brand-blue"></div>
            </label>
            <span class="text-sm font-medium text-gray-700">Đang bán</span>
        </div>

        <!-- Actions -->
        <div class="flex items-center gap-3 pt-4 border-t border-gray-100">
            <button type="submit"
                    class="px-6 py-2.5 bg-brand-blue text-white text-sm font-medium rounded-xl hover:bg-brand-blue/90 transition-colors">
                <span th:text="${product != null} ? 'Cập nhật' : 'Thêm sản phẩm'">Thêm sản phẩm</span>
            </button>
            <a th:href="@{/seller/products(shopId=${shopId})}"
               class="px-6 py-2.5 bg-gray-100 text-gray-700 text-sm font-medium rounded-xl hover:bg-gray-200 transition-colors">
                Hủy
            </a>
        </div>
    </form>

<script th:inline="javascript">
    const uploadedImages = [];

    function handleImageUpload(input) {
        const files = input.files;
        if (!files.length) return;

        Array.from(files).forEach(file => {
            const formData = new FormData();
            formData.append('file', file);

            fetch('/seller/products/upload-image', {
                credentials: 'same-origin',
                method: 'POST',
                body: formData
            })
            .then(res => res.json())
            .then(data => {
                console.log("Upload response:", data);
                if (data.url) {
                    uploadedImages.push(data.url);
                    renderPreviews();
                }
            })
            .catch(err => {
                alert('Lỗi upload ảnh: ' + err.message);
            });
        });

        input.value = '';
    }

    function renderPreviews() {
        const container = document.getElementById('image-previews');
        const hiddenContainer = document.getElementById('hidden-image-inputs');
        container.innerHTML = '';
        hiddenContainer.innerHTML = '';

        uploadedImages.forEach((url, index) => {
            // Preview card
            const card = document.createElement('div');
            card.style.cssText = 'position:relative;width:6rem;height:6rem;border-radius:0.75rem;overflow:hidden;border:1px solid #e5e7eb;';
            card.innerHTML =
                '<img src="' + url + '" style="width:100%;height:100%;object-fit:cover;">' +
                '<div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center gap-2">' +
                    (index === 0 ? '<span class="text-xs text-yellow-300 font-bold">★ Chính</span>' : '<button type="button" onclick="setMainImage(' + index + ')" class="text-xs text-yellow-300 hover:underline">Đặt chính</button>') +
                    '<button type="button" onclick="removeImage(' + index + ')" class="text-white hover:text-red-400">' +
                        '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>' +
                    '</button>' +
                '</div>';
            container.appendChild(card);

            // Hidden input
            const hidden = document.createElement('input');
            hidden.type = 'hidden';
            hidden.name = 'imageUrls';
            hidden.value = url;
            hiddenContainer.appendChild(hidden);
        });

        // Main image hidden input
        if (uploadedImages.length > 0) {
            const mainHidden = document.createElement('input');
            mainHidden.type = 'hidden';
            mainHidden.name = 'mainImageUrl';
            mainHidden.value = uploadedImages[0];
            hiddenContainer.appendChild(mainHidden);
        }
    }

    function removeImage(index) {
        uploadedImages.splice(index, 1);
        renderPreviews();
    }

    function setMainImage(index) {
        const url = uploadedImages.splice(index, 1)[0];
        uploadedImages.unshift(url);
        renderPreviews();
    }

    // Load existing images for edit mode
    const existingImages = /*[[${product != null && product.images != null ? product.images : null}]]*/ null;
    if (existingImages && existingImages.length > 0) {
        existingImages.sort((a, b) => (b.isMain ? 1 : 0) - (a.isMain ? 1 : 0));
        existingImages.forEach(img => uploadedImages.push(img.imageUrl));
        renderPreviews();
    }
</script>
</div>


</body>
</html>
