<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="main-layout(content)">
<head>
    <meta charset="UTF-8">
    <title>Kênh Người Bán - SmartShop</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <style>
        body { display: flex; min-height: 100vh; background-color: #f8f9fa; }
        .sidebar { width: 260px; background: #212529; color: white; padding: 20px; }
        .sidebar a { color: rgba(255,255,255,0.8); text-decoration: none; display: block; padding: 10px; border-radius: 4px; }
        .sidebar a:hover, .sidebar a.active { background: #343a40; color: white; }
        .main-content { flex: 1; padding: 30px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h4 class="text-center text-warning border-bottom pb-2">SmartShop Seller</h4>
        <div class="nav flex-column mt-3">
            <a href="/seller/dashboard" class="active">📊 Giao diện Tổng quan</a>
            <a href="/seller/products" class="mt-1">📦 Danh mục sản phẩm</a>
            <a href="/" class="mt-5 text-danger border-top pt-3">↩ Về trang chủ</a>
        </div>
    </div>
    <div class="main-content">
        <div th:replace="${content}"></div>
    </div>
</body>
</html>
